<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lavender - Movie Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-color: #020617;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        .light-mode {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --input-bg: rgba(0, 0, 0, 0.05);
        }

        body { 
            font-family: 'SF Pro Display', -apple-system, sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .iphone-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .search-results-glass {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lavender-text {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lavender-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        .apple-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .apple-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .memoji-avatar {
            border: 2px solid rgba(129, 140, 248, 0.5);
            transition: all 0.3s ease;
        }

        input {
            background-color: var(--input-bg) !important;
            color: var(--text-color) !important;
        }

        .scroll-container {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
            padding-bottom: 40px;
            padding-top: 20px;
            padding-left: 20px;
            padding-right: 20px;
        }
        
        @media (min-width: 768px) {
            .scroll-container { padding-left: 48px; padding-right: 48px; }
        }

        .scroll-container::-webkit-scrollbar { display: none; }
        .scroll-item { scroll-snap-align: start; flex-shrink: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        @keyframes shimmer {
            0% { background-position: -450px 0; }
            100% { background-position: 450px 0; }
        }

        .skeleton {
            background: linear-gradient(to right, rgba(255,255,255,0.05) 8%, rgba(255,255,255,0.12) 18%, rgba(255,255,255,0.05) 33%);
            background-size: 800px 100%;
            animation: shimmer 2s infinite linear;
        }

        .movie-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        @media (min-width: 768px) {
            .movie-card:hover {
                transform: scale(1.2);
                z-index: 50;
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            }
        }

        .info-overlay {
            opacity: 0;
            transition: opacity 0.3s ease;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
        }

        .movie-card:hover .info-overlay {
            opacity: 1;
        }

        .fav-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 60;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .movie-card:hover .fav-btn {
            opacity: 1;
        }

        @media (max-width: 640px) {
            .nav-container { top: 12px !important; width: 94% !important; padding: 8px 16px !important; }
            .hero-title { font-size: 2.5rem !important; }
            .hero-section { height: 65vh !important; padding-bottom: 80px !important; padding-left: 24px !important; }
            .row-title { padding-left: 24px !important; font-size: 1.1rem !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_KEY = "42943f9ce70074a70d6fb6c2ce3b5188"; 
        const BASE_URL = "https://api.themoviedb.org/3";
        const IMG_PATH = "https://image.tmdb.org/t/p/original";

        const MovieSkeleton = () => (
            <div className="scroll-item w-[150px] md:w-[220px] h-[220px] md:h-[320px] rounded-[24px] md:rounded-[32px] skeleton border border-white/5"></div>
        );

        const Row = ({ title, data, onSelect, onToggleFav, favorites, isLoading }) => (
            <div className="row-container">
                <h3 className="row-title px-6 md:px-12 text-lg md:text-xl font-bold mb-2 flex items-center gap-2">
                    <span className="w-1.5 h-5 bg-purple-500 rounded-full shadow-[0_0_10px_#a855f7]"></span> {title}
                </h3>
                <div className="scroll-container gap-4 md:gap-8 !overflow-visible"> 
                    {isLoading ? (
                        [...Array(6)].map((_, i) => <MovieSkeleton key={i} />)
                    ) : (
                        data && data.map(m => (
                            <div key={m.id} onClick={() => onSelect(m)} className="movie-card scroll-item w-[150px] md:w-[220px] h-[220px] md:h-[320px] rounded-[24px] md:rounded-[32px] overflow-hidden cursor-pointer active:scale-95 transition-all shadow-xl border border-white/5 relative group bg-slate-900">
                                <img src={m.poster_path ? IMG_PATH + m.poster_path : 'https://via.placeholder.com/200x300'} className="w-full h-full object-cover transition-transform duration-500 group-hover:brightness-50" loading="lazy" />
                                
                                {/* Nâng cấp: Nút yêu thích */}
                                <button 
                                    onClick={(e) => { e.stopPropagation(); onToggleFav(m); }}
                                    className="fav-btn w-8 h-8 rounded-full iphone-glass flex items-center justify-center text-xs"
                                >
                                    <i className={`fa-heart ${favorites.some(f => f.id === m.id) ? 'fas text-red-500' : 'far text-white'}`}></i>
                                </button>

                                <div className="info-overlay absolute inset-0 flex flex-col justify-end p-4 md:p-6">
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 scale-0 group-hover:scale-100 transition-transform duration-300">
                                        <div className="w-12 h-12 rounded-full bg-white flex items-center justify-center text-black shadow-lg">
                                            <i className="fas fa-play ml-1"></i>
                                        </div>
                                    </div>
                                    <p className="text-white text-[10px] md:text-xs font-black mb-2 truncate uppercase tracking-wider">{m.title || m.name}</p>
                                    <div className="flex items-center gap-3 text-[9px] md:text-[11px] font-bold">
                                        <span className="flex items-center gap-1 text-yellow-400">
                                            <i className="fas fa-star"></i> {m.vote_average ? m.vote_average.toFixed(1) : "7.5"}
                                        </span>
                                        <span className="text-white/70">
                                            {m.release_date ? m.release_date.split('-')[0] : (m.first_air_date ? m.first_air_date.split('-')[0] : "2026")}
                                        </span>
                                        <span className="px-1.5 py-0.5 rounded border border-green-500 text-green-500 text-[8px]">4K</span>
                                    </div>
                                </div>
                            </div>
                        ))
                    )}
                </div>
            </div>
        );

        const App = () => {
            const [page, setPage] = useState('login'); 
            const [activeId, setActiveId] = useState(null);
            const [isTV, setIsTV] = useState(false);
            const [season, setSeason] = useState(1);
            const [episode, setEpisode] = useState(1);
            const [server, setServer] = useState('to'); 
            const [searchQuery, setSearchQuery] = useState("");
            const [debouncedSearch, setDebouncedSearch] = useState("");
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [isSignUp, setIsSignUp] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [continueWatching, setContinueWatching] = useState([]);
            const [aiRecs, setAiRecs] = useState([]);
            
            // Nâng cấp: State cho danh sách yêu thích
            const [favorites, setFavorites] = useState(() => {
                return JSON.parse(localStorage.getItem('lavender_favorites') || '[]');
            });

            const [isDarkMode, setIsDarkMode] = useState(() => {
                const savedTheme = localStorage.getItem('lavender_theme');
                return savedTheme !== null ? JSON.parse(savedTheme) : true;
            });

            const [movies, setMovies] = useState({ 
                trending: [], tvTrending: [], anime: [], action: [], horror: [], scifi: [] 
            });

            const goToHome = () => {
                setPage('home');
                setActiveId(null);
                setIsTV(false);
                setSearchQuery("");
                setSearchResults([]);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            useEffect(() => {
                if (!isDarkMode) {
                    document.body.classList.add('light-mode');
                } else {
                    document.body.classList.remove('light-mode');
                }
                localStorage.setItem('lavender_theme', JSON.stringify(isDarkMode));
            }, [isDarkMode]);

            useEffect(() => {
                const history = JSON.parse(localStorage.getItem('lavender_history') || '[]');
                setContinueWatching(history);

                const fetchMovies = async () => {
                    setIsLoading(true);
                    const urls = {
                        trending: `${BASE_URL}/trending/movie/week?api_key=${API_KEY}&language=vi-VN`,
                        tvTrending: `${BASE_URL}/trending/tv/week?api_key=${API_KEY}&language=vi-VN`,
                        anime: `${BASE_URL}/discover/tv?api_key=${API_KEY}&with_genres=16&with_original_language=ja&language=vi-VN`,
                        action: `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=28&language=vi-VN`,
                        horror: `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=27&language=vi-VN`,
                        scifi: `${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=878&language=vi-VN`
                    };
                    
                    const fetchedData = {};
                    for (const [key, url] of Object.entries(urls)) {
                        try {
                            const res = await fetch(url);
                            const json = await res.json();
                            fetchedData[key] = json.results || [];
                        } catch (e) { fetchedData[key] = []; }
                    }
                    setMovies(prev => ({ ...prev, ...fetchedData }));
                    setTimeout(() => setIsLoading(false), 1200);
                };
                fetchMovies();
            }, []);

            useEffect(() => {
                if (continueWatching.length > 0) {
                    const last = continueWatching[0];
                    fetch(`${BASE_URL}/${last.isTV ? 'tv' : 'movie'}/${last.id}/recommendations?api_key=${API_KEY}&language=vi-VN`)
                        .then(res => res.json())
                        .then(data => setAiRecs(data.results.slice(0, 12) || []));
                }
            }, [continueWatching]);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setDebouncedSearch(searchQuery);
                }, 500);
                return () => clearTimeout(timer);
            }, [searchQuery]);

            useEffect(() => {
                if (debouncedSearch.length > 1) {
                    setIsSearching(true);
                    fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${debouncedSearch}&language=vi-VN`)
                        .then(res => res.json())
                        .then(data => {
                            setSearchResults(data.results || []);
                            setIsSearching(false);
                        })
                        .catch(err => {
                            console.error("Search error:", err);
                            setIsSearching(false);
                        });
                } else {
                    setSearchResults([]);
                    setIsSearching(false);
                }
            }, [debouncedSearch]);

            // Nâng cấp: Tự động lưu tiến trình khi đổi tập phim
            useEffect(() => {
                if (page === 'watch' && isTV) {
                    setContinueWatching(prev => {
                        const updated = prev.map(m => 
                            m.id === activeId ? { ...m, lastSeason: season, lastEpisode: episode } : m
                        );
                        localStorage.setItem('lavender_history', JSON.stringify(updated));
                        return updated;
                    });
                }
            }, [season, episode]);

            const toggleTheme = () => {
                setIsDarkMode(!isDarkMode);
            };

            const toggleFavorite = (item) => {
                let newFavs;
                if (favorites.some(f => f.id === item.id)) {
                    newFavs = favorites.filter(f => f.id !== item.id);
                } else {
                    newFavs = [...favorites, item];
                }
                setFavorites(newFavs);
                localStorage.setItem('lavender_favorites', JSON.stringify(newFavs));
            };

            const handleSelectMedia = (item, tvStatus) => {
                // Kiểm tra xem đã từng xem phim này chưa để lấy lại tập cũ
                const savedProgress = continueWatching.find(m => m.id === item.id);
                
                const historyItem = {
                    id: item.id,
                    title: item.title || item.name,
                    poster: item.poster_path,
                    backdrop: item.backdrop_path,
                    isTV: tvStatus,
                    lastSeason: savedProgress?.lastSeason || 1,
                    lastEpisode: savedProgress?.lastEpisode || 1
                };

                const filtered = continueWatching.filter(m => m.id !== item.id);
                const newHistory = [historyItem, ...filtered].slice(0, 10);
                setContinueWatching(newHistory);
                localStorage.setItem('lavender_history', JSON.stringify(newHistory));

                setActiveId(item.id);
                setIsTV(tvStatus);
                setSeason(historyItem.lastSeason);
                setEpisode(historyItem.lastEpisode);
                setServer('to');
                setPage('watch');
                setSearchQuery("");
                setSearchResults([]);
                window.scrollTo(0,0);
            };

            const highlightText = (text, highlight) => {
                if (!highlight.trim()) return text;
                const parts = text.split(new RegExp(`(${highlight})`, 'gi'));
                return parts.map((part, i) => 
                    part.toLowerCase() === highlight.toLowerCase() 
                    ? <span key={i} className="text-indigo-400 underline underline-offset-2">{part}</span> 
                    : part
                );
            };

            if (page === 'login') {
                return (
                    <div className="h-screen w-full flex items-center justify-center relative overflow-hidden bg-slate-950 px-4">
                        <div className="absolute top-[-10%] left-[-10%] w-[300px] md:w-[500px] h-[300px] md:h-[500px] bg-purple-600/10 blur-[120px] rounded-full animate-pulse"></div>
                        <div className="iphone-glass w-full max-w-[400px] p-8 md:p-10 rounded-[40px] md:rounded-[45px] text-center z-10 transition-all">
                            <div className="w-20 h-20 md:w-24 md:h-24 rounded-full overflow-hidden mx-auto mb-6 memoji-avatar bg-indigo-500/20 shadow-2xl">
                                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=LavenderUser&backgroundColor=b6e3f4,c0aede" alt="Avatar" className="w-full h-full object-cover" />
                            </div>
                            <h2 className="text-2xl md:text-3xl font-bold mb-2 text-white">{isSignUp ? "Tạo tài khoản" : "Chào mừng Đạt"}</h2>
                            <p className="opacity-50 text-xs md:text-sm mb-8 text-white">Trải nghiệm điện ảnh đỉnh cao</p>
                            <div className="space-y-4">
                                {isSignUp && <input type="text" placeholder="Họ và tên" className="w-full p-4 rounded-2xl outline-none border border-white/10 text-sm" />}
                                <input type="email" placeholder="Email" className="w-full p-4 rounded-2xl outline-none border border-white/10 text-sm" />
                                <input type="password" placeholder="Mật khẩu" className="w-full p-4 rounded-2xl outline-none border border-white/10 text-sm" />
                                <button onClick={() => setPage('home')} className="w-full p-4 rounded-2xl bg-indigo-600 text-white font-bold hover:bg-indigo-500 transition-all shadow-lg active:scale-95 text-sm">
                                    {isSignUp ? "Đăng ký" : "Đăng nhập"}
                                </button>
                            </div>
                            <div className="flex items-center my-6 md:my-8 opacity-20"><div className="flex-1 h-[1px] bg-white"></div><span className="px-4 text-[10px] text-white">Hoặc</span><div className="flex-1 h-[1px] bg-white"></div></div>
                            <div className="flex justify-center gap-4 md:gap-6">
                                <button className="w-12 h-12 md:w-14 md:h-14 rounded-full apple-btn flex items-center justify-center text-xl text-white"><i className="fab fa-apple"></i></button>
                                <button className="w-12 h-12 md:w-14 md:h-14 rounded-full apple-btn flex items-center justify-center text-lg text-white"><i className="fab fa-google"></i></button>
                                <button className="w-12 h-12 md:w-14 md:h-14 rounded-full apple-btn flex items-center justify-center text-lg text-white"><i className="fab fa-facebook-f"></i></button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {page !== 'watch' && (
                        <nav className="nav-container fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-5xl z-[100] iphone-glass py-2.5 md:py-3 px-4 md:px-6 rounded-[24px] md:rounded-[28px] flex justify-between items-center">
                            <h1 onClick={goToHome} className="text-lg md:text-2xl font-black cursor-pointer lavender-text tracking-tighter shrink-0 active:scale-95 transition-transform">LAVENDER</h1>
                            <div className="flex items-center gap-2 md:gap-3">
                                <div className="relative flex items-center">
                                    <input 
                                        type="text" 
                                        placeholder="Tìm..." 
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        className="pl-4 pr-10 py-1.5 md:py-2 rounded-xl md:rounded-2xl text-xs md:text-sm w-24 md:w-48 focus:w-32 md:focus:w-64 transition-all outline-none border border-white/10"
                                    />
                                    {isSearching && (
                                        <div className="absolute right-3 animate-spin text-indigo-400 text-[10px] md:text-xs">
                                            <i className="fas fa-circle-notch"></i>
                                        </div>
                                    )}
                                    {(searchQuery.length > 1) && (
                                        <div className="absolute top-12 right-0 md:left-0 w-[260px] md:w-80 max-h-[350px] overflow-y-auto rounded-2xl search-results-glass p-2 space-y-1 scrollbar-hide z-50 shadow-2xl">
                                            {!isSearching && searchResults.length === 0 && (
                                                <div className="p-8 text-center">
                                                    <i className="fas fa-search-minus opacity-20 text-2xl mb-2 text-white"></i>
                                                    <p className="text-[10px] text-white/50">Không tìm thấy "{searchQuery}"</p>
                                                </div>
                                            )}
                                            {!isSearching && searchResults.map(m => (
                                                <div key={m.id} onClick={() => handleSelectMedia(m, m.media_type === 'tv')} className="flex gap-3 p-2 hover:bg-white/10 rounded-xl cursor-pointer items-center group">
                                                    <img src={m.poster_path ? IMG_PATH + m.poster_path : 'https://via.placeholder.com/40x60'} className="w-8 h-12 md:w-10 md:h-14 object-cover rounded-lg shadow-md" />
                                                    <div className="overflow-hidden text-left">
                                                        <p className="text-xs md:text-sm font-bold truncate text-white">
                                                            {highlightText(m.title || m.name || "", searchQuery)}
                                                        </p>
                                                        <p className="text-[9px] md:text-[10px] opacity-50 text-white">{m.media_type === 'tv' ? 'Phim bộ' : 'Phim lẻ'}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <button onClick={toggleTheme} className="w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center border border-white/10 hover:bg-white/10 transition-all text-sm md:text-base">
                                    {isDarkMode ? <i className="fas fa-moon text-indigo-300"></i> : <i className="fas fa-sun text-orange-400"></i>}
                                </button>
                                <div className="w-8 h-8 md:w-10 md:h-10 rounded-full border border-purple-500/30 overflow-hidden cursor-pointer" onClick={() => setPage('login')}>
                                    <img src="https://ui-avatars.com/api/?name=Dat&background=6366f1&color=fff" alt="Avatar" className="w-full h-full" />
                                </div>
                            </div>
                        </nav>
                    )}

                    {page === 'home' && (
                        <div className="pt-0">
                            {isLoading ? (
                                <div className="h-[65vh] md:h-[85vh] w-full skeleton opacity-40"></div>
                            ) : (
                                movies.trending[0] && (
                                    <div className="hero-section relative h-[65vh] md:h-[85vh] w-full flex items-end pb-24 md:pb-32 px-6 md:px-12 overflow-hidden">
                                        <img src={IMG_PATH + movies.trending[0].backdrop_path} className="absolute inset-0 w-full h-full object-cover z-0" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-[var(--bg-color)] via-[var(--bg-color)]/30 to-transparent z-10"></div>
                                        <div className="relative z-20 max-w-2xl">
                                            <h2 className="hero-title text-3xl md:text-6xl font-black mb-4 md:mb-6 text-white leading-tight">{movies.trending[0].title}</h2>
                                            <div className="flex gap-4">
                                                <button onClick={() => handleSelectMedia(movies.trending[0], false)} className="px-8 md:px-10 py-2.5 md:py-3 lavender-gradient text-white rounded-full text-sm md:text-base font-bold hover:scale-105 transition-transform shadow-lg active:scale-95">Phát ngay</button>
                                                <button onClick={() => toggleFavorite(movies.trending[0])} className="w-12 h-12 md:w-14 md:h-14 rounded-full iphone-glass text-white flex items-center justify-center hover:scale-105 transition-all">
                                                    <i className={`${favorites.some(f => f.id === movies.trending[0].id) ? 'fas fa-heart text-red-500' : 'far fa-heart'}`}></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )
                            )}

                            <div className="relative z-30 space-y-10 md:space-y-16 pb-20 -mt-10 md:-mt-20">
                                {/* Hàng Tiếp tục xem */}
                                {continueWatching.length > 0 && !isLoading && (
                                    <div className="row-container">
                                        <h3 className="row-title px-6 md:px-12 text-lg md:text-xl font-bold mb-4 md:mb-6 text-indigo-400 flex items-center gap-2">
                                            <span className="w-1.5 h-5 bg-indigo-500 rounded-full"></span> Tiếp tục xem
                                        </h3>
                                        <div className="scroll-container gap-4 md:gap-5">
                                            {continueWatching.map(m => (
                                                <div key={m.id} onClick={() => handleSelectMedia(m, m.isTV)} className="scroll-item w-[240px] md:w-[280px] h-[140px] md:h-[160px] rounded-[24px] md:rounded-[32px] overflow-hidden cursor-pointer border border-white/10 relative group shadow-lg">
                                                    <img src={IMG_PATH + m.backdrop} className="w-full h-full object-cover opacity-80 group-active:scale-105 transition-all duration-500" />
                                                    <div className="absolute inset-0 bg-gradient-to-t from-black flex flex-col justify-end p-4">
                                                        <p className="text-white font-bold text-xs md:text-sm truncate">{m.title}</p>
                                                        {m.isTV && <p className="text-white/50 text-[10px]">Tập {m.lastEpisode} - Mùa {m.lastSeason}</p>}
                                                        <div className="w-full h-1 bg-white/20 mt-2 rounded-full overflow-hidden">
                                                            <div className="w-1/3 h-full lavender-gradient"></div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Nâng cấp: Hàng Danh sách yêu thích */}
                                {favorites.length > 0 && (
                                    <Row title="❤️ Danh sách của Đạt" data={favorites} favorites={favorites} onToggleFav={toggleFavorite} onSelect={(m) => handleSelectMedia(m, m.first_air_date ? true : false)} isLoading={false} />
                                )}

                                <Row title="✨ AI Gợi ý cho Đạt" data={aiRecs} favorites={favorites} onToggleFav={toggleFavorite} isLoading={isLoading} onSelect={(m) => handleSelectMedia(m, false)} />
                                <Row title="🔥 Phim Thịnh Hành" data={movies.trending} favorites={favorites} onToggleFav={toggleFavorite} isLoading={isLoading} onSelect={(m) => handleSelectMedia(m, false)} />
                                <Row title="📺 Phim Bộ Hot" data={movies.tvTrending} favorites={favorites} onToggleFav={toggleFavorite} isLoading={isLoading} onSelect={(m) => handleSelectMedia(m, true)} />
                                <Row title="🎎 Thế Giới Anime" data={movies.anime} favorites={favorites} onToggleFav={toggleFavorite} isLoading={isLoading} onSelect={(m) => handleSelectMedia(m, true)} />
                            </div>
                        </div>
                    )}

                    {page === 'watch' && (
                        <div className="min-h-screen w-full bg-black flex flex-col items-center pt-20 md:justify-center p-4">
                            <button onClick={() => setPage('home')} className="fixed top-6 left-6 z-50 px-5 py-2 md:px-6 md:py-2 apple-btn rounded-full text-white text-xs md:text-sm">← Trở về</button>
                            <div className="w-full max-w-5xl flex flex-col gap-4 md:gap-6">
                                <div className="aspect-video w-full rounded-2xl md:rounded-3xl overflow-hidden shadow-2xl border border-white/10 bg-slate-900 relative">
                                    <iframe 
                                        src={isTV 
                                            ? `https://vidsrc.${server}/embed/tv/${activeId}/${season}/${episode}` 
                                            : `https://vidsrc.${server}/embed/movie/${activeId}`} 
                                        className="w-full h-full"
                                        allowFullScreen
                                    ></iframe>
                                </div>
                                
                                <div className="flex flex-wrap gap-2 md:gap-3 justify-center items-center iphone-glass p-3 md:p-4 rounded-2xl">
                                    <span className="text-white/50 text-[10px] md:text-xs mr-1 md:mr-2 font-semibold tracking-widest uppercase">Server:</span>
                                    {[{id:'to', name:'TO'}, {id:'me', name:'ME'}, {id:'xyz', name:'XYZ'}, {id:'pro', name:'PRO'}].map((srv) => (
                                        <button key={srv.id} onClick={() => setServer(srv.id)} className={`px-3 py-1.5 md:px-4 md:py-2 rounded-lg md:rounded-xl text-[10px] md:text-xs font-bold transition-all ${server === srv.id ? 'lavender-gradient text-white' : 'bg-white/5 text-gray-400 hover:bg-white/10'}`}>{srv.name}</button>
                                    ))}
                                </div>

                                {isTV && (
                                    <div className="iphone-glass p-4 md:p-6 rounded-[24px] md:rounded-[32px] flex flex-col gap-4">
                                        {/* Nâng cấp: Nút điều khiển nhanh */}
                                        <div className="flex items-center justify-between">
                                            <h3 className="font-bold text-sm md:text-lg text-white">Chọn tập phim</h3>
                                            <div className="flex items-center gap-4">
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => setEpisode(prev => Math.max(1, prev - 1))} className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white text-xs hover:bg-white/20 transition-all"><i className="fas fa-chevron-left"></i></button>
                                                    <span className="text-white font-bold text-xs">Tập {episode}</span>
                                                    <button onClick={() => setEpisode(prev => prev + 1)} className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white text-xs hover:bg-white/20 transition-all"><i className="fas fa-chevron-right"></i></button>
                                                </div>
                                                <div className="flex items-center gap-2 border-l border-white/10 pl-4">
                                                    <span className="text-[10px] md:text-xs opacity-50 text-white">Mùa:</span>
                                                    <input type="number" min="1" value={season} onChange={(e) => setSeason(parseInt(e.target.value) || 1)} className="w-10 md:w-12 bg-white/10 rounded-md text-center text-xs md:text-sm outline-none text-white p-1" />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-6 sm:grid-cols-8 md:flex md:flex-wrap gap-2 md:gap-3 max-h-40 overflow-y-auto md:overflow-visible pr-1 scrollbar-hide">
                                            {[...Array(24)].map((_, i) => (
                                                <button key={i} onClick={() => setEpisode(i + 1)} className={`aspect-square md:min-w-[50px] md:h-[50px] rounded-xl md:rounded-2xl transition-all font-bold text-xs md:text-sm ${episode === i + 1 ? 'lavender-gradient text-white shadow-lg shadow-purple-500/20' : 'bg-white/5 hover:bg-white/20 text-white'}`}>{i + 1}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
