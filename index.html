                                    </div>
                                )}
                                
                                <h2 className="text-3xl font-black mb-2 text-white tracking-tighter slide-fade-stagger" style={{animationDelay: '0.1s'}}>{isSignUp ? "Tạo tài khoản" : "Chào mừng trở lại"}</h2>
                                <p className="opacity-60 text-sm mb-8 font-medium slide-fade-stagger" style={{animationDelay: '0.2s'}}>Trải nghiệm điện ảnh đỉnh cao</p>
                                
                                <form onSubmit={handleAuth} className="space-y-4 slide-fade-stagger" style={{animationDelay: '0.3s'}}>
                                    {authError && <div className="text-red-400 text-sm font-bold bg-red-500/10 py-3 rounded-[16px] border border-red-500/20"><i className="fas fa-exclamation-circle mr-2"></i> {authError}</div>}
                                    
                                    {/* NÂNG CẤP LOGIN: Floating Labels */}
                                    {isSignUp && (
                                        <div className="relative group text-left">
                                            <input type="text" value={loginName} onChange={(e) => setLoginName(e.target.value)} placeholder=" " className="peer caret-lavender w-full pl-12 pr-5 pt-6 pb-2 outline-none border border-white/10 text-sm bg-black/20 transition-colors rounded-[20px]" style={{borderColor: 'transparent'}} onFocus={(e)=>e.target.style.borderColor='var(--accent-primary)'} onBlur={(e)=>e.target.style.borderColor='rgba(255,255,255,0.1)'} />
                                            <i className="fas fa-user absolute left-5 top-1/2 -translate-y-1/2 text-white/40 z-10 transition-colors peer-focus:text-[var(--accent-primary)] pointer-events-none"></i>
                                            <label className="absolute left-12 top-4 text-white/40 text-sm pointer-events-none transition-all duration-300 -translate-y-1/2 peer-focus:-translate-y-2.5 peer-focus:scale-75 peer-focus:text-[var(--accent-primary)] peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-placeholder-shown:text-white/40 -translate-y-2.5 scale-75 text-white/70 origin-left">Họ và tên</label>
                                        </div>
                                    )}
                                    
                                    <div className="relative group text-left">
                                        <input type="email" value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)} placeholder=" " className="peer caret-lavender w-full pl-12 pr-5 pt-6 pb-2 outline-none border border-white/10 text-sm bg-black/20 transition-colors rounded-[20px]" style={{borderColor: 'transparent'}} onFocus={(e)=>e.target.style.borderColor='var(--accent-primary)'} onBlur={(e)=>e.target.style.borderColor='rgba(255,255,255,0.1)'} />
                                        <i className="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-white/40 z-10 transition-colors peer-focus:text-[var(--accent-primary)] pointer-events-none"></i>
                                        <label className="absolute left-12 top-4 text-white/40 text-sm pointer-events-none transition-all duration-300 -translate-y-1/2 peer-focus:-translate-y-2.5 peer-focus:scale-75 peer-focus:text-[var(--accent-primary)] peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-placeholder-shown:text-white/40 -translate-y-2.5 scale-75 text-white/70 origin-left">Email</label>
                                    </div>
                                    
                                    <div className="relative group text-left">
                                        <input type="password" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} placeholder=" " className="peer caret-lavender w-full pl-12 pr-5 pt-6 pb-2 outline-none border border-white/10 text-sm bg-black/20 transition-colors rounded-[20px]" style={{borderColor: 'transparent'}} onFocus={(e)=>e.target.style.borderColor='var(--accent-primary)'} onBlur={(e)=>e.target.style.borderColor='rgba(255,255,255,0.1)'} />
                                        <i className="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-white/40 z-10 transition-colors peer-focus:text-[var(--accent-primary)] pointer-events-none"></i>
                                        <label className="absolute left-12 top-4 text-white/40 text-sm pointer-events-none transition-all duration-300 -translate-y-1/2 peer-focus:-translate-y-2.5 peer-focus:scale-75 peer-focus:text-[var(--accent-primary)] peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-placeholder-shown:text-white/40 -translate-y-2.5 scale-75 text-white/70 origin-left">Mật khẩu</label>
                                    </div>
                                    
                                    <div className="flex gap-3 mt-2 pt-2">
                                        <button type="submit" className="flex-1 p-4 lavender-gradient border-[0.5px] border-white/30 text-white font-black rounded-full btn-press text-sm uppercase tracking-widest transition-all duration-300 shadow-[0_0_20px_var(--accent-primary)]">
                                            {isSignUp ? "Đăng ký" : "Đăng nhập"}
                                        </button>
                                        
                                        {/* NÂNG CẤP LOGIN: Biometrics (Giả lập FaceID/TouchID) */}
                                        {!isSignUp && (
                                            <button type="button" onClick={() => { triggerHaptic(); alert("Chức năng quét vân tay/FaceID giả lập thành công!"); }} className="w-14 h-14 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-white/80 hover:text-white hover:bg-white/20 transition-all btn-press shrink-0" title="Xác thực sinh trắc học" aria-label="Xác thực sinh trắc học">
                                                <i className="fas fa-fingerprint text-xl"></i>
                                            </button>
                                        )}
                                    </div>
                                </form>
                                
                                <div className="mt-8 flex flex-col gap-5 slide-fade-stagger" style={{animationDelay: '0.4s'}}>
                                    <div className="relative flex items-center py-2">
                                        <div className="flex-grow border-t border-white/10"></div>
                                        <span className="flex-shrink-0 mx-4 text-white/40 text-[10px] font-bold uppercase tracking-widest">Hoặc tiếp tục với</span>
                                        <div className="flex-grow border-t border-white/10"></div>
                                    </div>
                                    <div className="flex justify-center gap-4">
                                        <button type="button" onClick={() => handleSocialLogin('Google')} className="w-14 h-14 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/20 transition-all btn-press group hover:border-red-400/50 hover:shadow-[0_0_20px_rgba(248,113,113,0.3)]" aria-label="Đăng nhập Google"><i className="fab fa-google text-white/70 group-hover:text-red-400 text-xl transition-colors"></i></button>
                                        <button type="button" onClick={() => handleSocialLogin('Facebook')} className="w-14 h-14 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/20 transition-all btn-press group hover:border-blue-400/50 hover:shadow-[0_0_20px_rgba(96,165,250,0.3)]" aria-label="Đăng nhập Facebook"><i className="fab fa-facebook-f text-white/70 group-hover:text-blue-400 text-xl transition-colors"></i></button>
                                        <button type="button" onClick={() => handleSocialLogin('Apple')} className="w-14 h-14 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/20 transition-all btn-press group hover:border-white/50 hover:shadow-[0_0_20px_rgba(255,255,255,0.3)]" aria-label="Đăng nhập Apple"><i className="fab fa-apple text-white/70 group-hover:text-white text-xl transition-colors"></i></button>
                                    </div>
                                </div>

                                <div className="mt-8 text-sm text-white/60 font-medium slide-fade-stagger" style={{animationDelay: '0.5s'}}>
                                    {isSignUp ? "Đã có tài khoản? " : "Chưa có tài khoản? "}
                                    <span onClick={() => { triggerHaptic(); setIsSignUp(!isSignUp); setAuthError(''); }} className="font-bold cursor-pointer transition-colors" style={{color: 'var(--accent-primary)'}}>{isSignUp ? "Đăng nhập" : "Đăng ký"}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative">
                    <CustomCursor /> <div className="noise-bg"></div>
                    <GlobalLoader /> <GlobalErrorUI />

                    {(isSearchFocused || showSearchDropdown) && (
                        <div className="fixed inset-0 z-[90] bg-black/40 backdrop-blur-sm transition-all duration-300" onClick={() => {setIsSearchFocused(false); setShowSearchDropdown(false);}}></div>
                    )}
                    
                    {toastMessage && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[300] iphone-glass px-6 py-4 rounded-3xl border-l-4 border-l-green-400 border-y border-r border-white/20 flex items-center gap-3 shadow-[0_20px_40px_rgba(52,211,153,0.4)] slide-fade-stagger bg-green-500/10">
                            <i className="fas fa-check-circle text-green-400 text-xl drop-shadow-[0_0_12px_rgba(52,211,153,0.8)]"></i>
                            <span className="text-white text-sm font-bold tracking-wide">{toastMessage}</span>
                        </div>
                    )}

                    {page !== 'watch' && (
                        <nav className={`nav-container fixed top-6 left-1/2 -translate-x-1/2 w-[92%] max-w-5xl z-[100] flex justify-between items-center transition-transform duration-500 ease-in-out ${showNav ? 'translate-y-0' : '-translate-y-[150%]'}`}>
                            <h1 onClick={goToHome} className="text-xl md:text-2xl font-black cursor-pointer lavender-text tracking-tighter shrink-0 btn-press flex items-center gap-2">
                                LAVENDER {isSyncing && <i className="fas fa-cloud-arrow-up text-xs syncing-icon ml-1 drop-shadow-md" style={{color: 'var(--accent-primary)'}}></i>}
                            </h1>
                            <div className="flex items-center gap-3 md:gap-4">
                                
                                <div className="relative group cursor-pointer hidden md:flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/10 transition-colors btn-press">
                                    <i className="fas fa-bell text-white/70 group-hover:text-white"></i>
                                    <span className="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
                                </div>

                                <div className="relative" ref={searchRef}>
                                    <div className={`flex items-center bg-black/20 backdrop-blur-md border transition-all duration-300 relative group ${isSearchFocused || showSearchDropdown ? 'search-bar-focus bg-black/40' : 'border-white/15'}`} style={{borderRadius: '999px'}}>
                                        <i className={`fas fa-search ml-4 text-xs md:text-sm transition-colors ${isSearchFocused || showSearchDropdown ? 'drop-shadow-lg' : 'text-white/50'}`} style={{color: (isSearchFocused || showSearchDropdown) ? 'var(--accent-primary)' : ''}}></i>
                                        
                                        <input 
                                            type="text" placeholder="Tìm kiếm phim..." value={searchQuery} 
                                            onChange={(e) => setSearchQuery(e.target.value)} 
                                            onFocus={() => { setIsSearchFocused(true); setShowSearchDropdown(true); }}
                                            onKeyDown={handleSearchInputKeyDown}
                                            className="pl-3 pr-[70px] py-3 bg-transparent text-sm w-36 md:w-64 focus:w-60 md:focus:w-80 transition-all outline-none text-[var(--text-color)] placeholder:text-white/40 font-medium" 
                                            style={{boxShadow: 'none', borderRadius: '0'}}
                                            aria-label="Khung tìm kiếm phim"
                                        />
                                        
                                        <div className="absolute right-3 flex items-center gap-1.5">
                                            {searchQuery && (
                                                <button onClick={() => { setSearchQuery(""); setShowSearchDropdown(true); searchRef.current.querySelector('input').focus(); }} className="w-6 h-6 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/30 text-white/70 hover:text-white transition-all btn-press text-[10px]" aria-label="Xóa văn bản"><i className="fas fa-times"></i></button>
                                            )}
                                            <button onClick={handleVoiceSearch} className={`w-7 h-7 flex items-center justify-center rounded-full btn-press transition-colors ${isListening ? 'bg-red-500 text-white animate-pulse shadow-[0_0_15px_rgba(239,68,68,0.6)]' : 'bg-white/5 text-white/60 hover:text-white hover:bg-white/20'}`} title="Tìm kiếm bằng giọng nói" aria-label="Tìm kiếm bằng giọng nói">
                                                <i className="fas fa-microphone text-xs"></i>
                                            </button>
                                            {!isSearchFocused && !searchQuery && <span className="hidden md:flex text-[10px] text-white/30 border border-white/10 px-1.5 py-0.5 rounded-md bg-white/5 font-bold select-none cursor-pointer" onClick={() => searchRef.current.querySelector('input').focus()} title="Phím tắt">/</span>}
                                        </div>
                                    </div>
                                    
                                    {showSearchDropdown && (
                                        <div className="absolute top-[calc(100%+16px)] right-0 w-[320px] md:w-[420px] glass-deep overflow-hidden z-[150] modal-spring border border-white/20 shadow-[0_30px_60px_rgba(0,0,0,0.7)] flex flex-col">
                                            
                                            <div className="flex border-b border-white/10 p-2 gap-2 bg-black/20">
                                                {[{id:'all', n:'Tất cả'}, {id:'movie', n:'Phim Lẻ'}, {id:'tv', n:'Series'}].map(f => (
                                                    <button key={f.id} onClick={() => setSearchFilterMenu(f.id)} className={`flex-1 py-1.5 rounded-lg text-xs font-bold transition-colors ${searchFilterMenu === f.id ? 'bg-white/15 text-white' : 'text-white/50 hover:bg-white/5 hover:text-white'}`}>{f.n}</button>
                                                ))}
                                            </div>

                                            {isSearching ? (
                                                <div className="py-5 px-3">
                                                    {[...Array(4)].map((_, i) => (
                                                        <div key={i} className="flex items-center gap-4 p-3 mx-2 rounded-2xl skeleton" style={{height: '80px', marginBottom: '8px'}}></div>
                                                    ))}
                                                </div>
                                            ) : searchResults.length > 0 ? (
                                                <div className="max-h-[450px] overflow-y-auto scrollbar-hide py-4">
                                                    {searchResults.filter(item => searchFilterMenu === 'all' ? true : (searchFilterMenu === 'movie' ? item.media_type === 'movie' : item.media_type === 'tv')).slice(0, 6).map((item, i) => (
                                                        <div key={item.id} onClick={() => { handleOpenModal(item); setShowSearchDropdown(false); setSearchQuery(""); }} className={`search-result-item flex items-center gap-4 p-3 hover:bg-white/10 cursor-pointer transition-all duration-300 mx-3 rounded-2xl group slide-fade-stagger ${i === searchSelectedIndex ? 'active' : ''}`} style={{animationDelay: `${i*0.05}s`}}>
                                                            <img src={item.poster_path ? (item.poster_path.startsWith('http') ? item.poster_path : `https://image.tmdb.org/t/p/w300${item.poster_path}`) : 'https://via.placeholder.com/60x90'} loading="lazy" decoding="async" className="w-14 h-20 object-cover rounded-xl border border-white/10 group-hover:scale-105 transition-transform duration-300 shadow-md" />
                                                            <div className="flex-1 min-w-0">
                                                                <p className="text-white text-sm md:text-base font-black truncate transition-colors" style={{color: (i === searchSelectedIndex) ? 'var(--accent-primary)' : ''}}>
                                                                    {highlightText(item.title || item.name, debouncedSearch)}
                                                                </p>
                                                                <div className="flex items-center gap-2 mt-1.5 text-[11px] text-white/60 font-bold">
                                                                    <span className="flex items-center gap-1 text-yellow-400"><i className="fas fa-star text-[10px]"></i> {item.vote_average?.toFixed(1) || 'N/A'}</span>
                                                                    <span>•</span><span>{item.release_date?.split('-')[0] || item.first_air_date?.split('-')[0] || "N/A"}</span>
                                                                    <span className="px-1.5 py-0.5 rounded bg-white/10 text-[9px] uppercase tracking-wider">{item.media_type === 'tv' ? 'Series' : 'Phim'}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : searchQuery ? (
                                                <div className="p-12 text-center flex flex-col items-center justify-center gap-4 text-white/40 slide-fade-stagger border border-dashed border-white/10 m-4 rounded-[24px]">
                                                    <div className="w-20 h-20 rounded-full bg-white/5 flex items-center justify-center border border-white/10 mb-2 shadow-inner">
                                                        <i className="fas fa-search-minus text-3xl text-white/30"></i>
                                                    </div>
                                                    <h4 className="text-white font-black text-lg mb-1 tracking-tight">Không tìm thấy kết quả</h4>
                                                    <p className="text-xs text-white/50 px-4 text-center leading-relaxed">Không tìm thấy phim "{searchQuery}". Thử từ khóa khác xem sao!</p>
                                                </div>
                                            ) : searchHistory.length > 0 ? (
                                                <div className="py-4 px-5 slide-fade-stagger">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <span className="text-[11px] font-black text-white/50 uppercase tracking-widest">Tìm kiếm gần đây</span>
                                                        <button onClick={() => { localStorage.removeItem('lavender_search_history'); setSearchHistory([]); }} className="text-[10px] text-white/40 hover:text-white font-bold bg-white/5 px-2 py-1 rounded-md border border-white/10 btn-press" aria-label="Xóa lịch sử tìm kiếm">XÓA</button>
                                                    </div>
                                                    <div className="flex flex-col gap-1">
                                                        {searchHistory.map((h, i) => (
                                                            <div key={i} onClick={() => { setSearchQuery(h); setShowSearchDropdown(true); searchRef.current.querySelector('input').focus(); }} className="flex items-center gap-3 p-3 hover:bg-white/10 rounded-xl cursor-pointer btn-press text-white/80 hover:text-white text-sm font-medium border border-transparent hover:border-white/10 transition-colors">
                                                                <i className="fas fa-history text-white/30 text-xs"></i> {h}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ) : null}
                                        </div>
                                    )}
                                </div>

                                <button onClick={() => globalStore.set({ isDarkMode: !isDarkMode })} className="theme-toggle-btn w-11 h-11 md:w-12 md:h-12 rounded-full border border-white/10 bg-black/20 backdrop-blur-md flex items-center justify-center text-white/80 hover:text-white hover:bg-white/10 transition-all btn-press shrink-0" aria-label="Đổi giao diện Sáng Tối">
                                    <i className={`fas ${isDarkMode ? 'fa-moon text-lg drop-shadow-md' : 'fa-sun text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.8)] text-lg'}`} style={{color: isDarkMode ? 'var(--accent-primary)' : ''}}></i>
                                </button>

                                <div className="relative profile-container">
                                    <div className="w-11 h-11 md:w-12 md:h-12 rounded-full border-[2.5px] overflow-hidden cursor-pointer btn-press" style={{borderColor: 'var(--accent-primary)', boxShadow: '0 0 15px var(--accent-primary)'}} onClick={() => setShowProfile(!showProfile)}>
                                        <img src={currentUser?.avatar || USER_AVATAR} alt="Avatar" decoding="async" className="w-full h-full object-cover" />
                                    </div>
                                    
                                    {showProfile && (
                                        <div className="absolute top-[calc(100%+16px)] right-0 w-[360px] glass-deep z-50 modal-spring shadow-[0_40px_80px_rgba(0,0,0,0.8)] overflow-hidden border border-white/20">
                                            <div className="relative h-28 w-full" style={{background: 'linear-gradient(to bottom right, var(--accent-primary), var(--accent-secondary))'}}>
                                                <div className="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg width=\'20\' height=\'20\' viewBox=\'0 0 20 20\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'%23ffffff\' fill-opacity=\'0.1\' fill-rule=\'evenodd\'%3E%3Ccircle cx=\'3\' cy=\'3\' r=\'3\'/%3E%3Ccircle cx=\'13\' cy=\'13\' r=\'3\'/%3E%3C/g%3E%3C/svg%3E')]"></div>
                                                <div className="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-[#020617] to-transparent"></div>
                                            </div>
                                            
                                            <div className="px-7 pb-7 -mt-12 relative z-10">
                                                <div className="flex flex-col items-center border-b border-white/10 pb-6 mb-5">
                                                    <div className="relative mb-3 group cursor-pointer btn-press" onClick={() => { setPage('profile'); setProfileTab('settings'); setShowProfile(false); setSettingsSuccess(false); window.scrollTo(0,0); }}>
                                                        <div className="absolute inset-0 rounded-full blur opacity-70 group-hover:opacity-100 transition-opacity duration-300 animate-pulse" style={{background: 'linear-gradient(to right, var(--accent-primary), var(--accent-secondary))'}}></div>
                                                        <div className="w-24 h-24 rounded-full p-1 border-2 border-white/30 bg-[#020617] shrink-0 relative z-10">
                                                            <img src={currentUser?.avatar || USER_AVATAR} decoding="async" className="w-full h-full rounded-full object-cover" />
                                                        </div>
                                                        <div className="absolute bottom-0 right-0 w-8 h-8 rounded-full border-2 border-[#020617] flex items-center justify-center relative z-20 text-white shadow-lg" style={{background: 'var(--accent-primary)'}}>
                                                            <i className="fas fa-camera text-xs"></i>
                                                        </div>
                                                    </div>
                                                    
                                                    <h3 className="text-white font-black text-2xl truncate tracking-tight text-center w-full drop-shadow-md">{currentUser?.name || "Người dùng"}</h3>
                                                    <p className="text-white/60 text-sm mt-0.5 truncate font-medium">{currentUser?.email}</p>
                                                    
                                                    <div className="mt-4 relative group overflow-hidden rounded-full p-[1px] cursor-default">
                                                        <span className="absolute inset-0 rounded-full animate-[shimmer_3s_linear_infinite] bg-[length:200%_100%]" style={{background: 'linear-gradient(to right, var(--accent-primary), var(--accent-secondary), var(--accent-primary))'}}></span>
                                                        <div className="relative bg-[#020617] px-4 py-1.5 rounded-full flex items-center gap-2">
                                                            <i className="fas fa-crown text-yellow-400 text-[10px] drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]"></i>
                                                            <span className="text-transparent bg-clip-text text-[11px] font-black uppercase tracking-widest" style={{backgroundImage: 'linear-gradient(to right, var(--accent-primary), var(--accent-secondary))'}}>Lavender Premium</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex flex-col gap-3 mb-6">
                                                    <div className="grid grid-cols-2 gap-3 mb-2">
                                                        <div onClick={() => { setPage('profile'); setProfileTab('favorites'); setShowProfile(false); window.scrollTo(0,0); }} className="flex flex-col items-center justify-center p-4 rounded-[24px] bg-white/5 border border-white/10 hover:bg-white/10 transition-colors cursor-pointer group shadow-inner btn-press">
                                                            <i className="fas fa-heart text-red-400 text-xl mb-1.5 drop-shadow-[0_0_10px_rgba(248,113,113,0.5)] group-hover:scale-110 transition-transform"></i>
                                                            <span className="text-white font-black text-xl leading-none">{favorites.length}</span>
                                                            <span className="text-[9px] text-white/50 uppercase font-bold tracking-widest mt-1">Yêu Thích</span>
                                                        </div>
                                                        <div onClick={() => { setPage('profile'); setProfileTab('history'); setShowProfile(false); window.scrollTo(0,0); }} className="flex flex-col items-center justify-center p-4 rounded-[24px] bg-white/5 border border-white/10 hover:bg-white/10 transition-colors cursor-pointer group shadow-inner btn-press">
                                                            <i className="fas fa-clock text-xl mb-1.5 group-hover:scale-110 transition-transform drop-shadow-md" style={{color: 'var(--accent-primary)'}}></i>
                                                            <span className="text-white font-black text-xl leading-none">{continueWatching.length}</span>
                                                            <span className="text-[9px] text-white/50 uppercase font-bold tracking-widest mt-1">Đã Xem</span>
                                                        </div>
                                                    </div>
                                                    
                                                    <div onClick={() => { setPage('profile'); setProfileTab('history'); setShowProfile(false); window.scrollTo(0,0); }} className="flex items-center justify-between p-4 rounded-[24px] bg-black/30 hover:bg-white/10 border border-white/5 hover:border-white/20 cursor-pointer transition-all text-sm text-white/80 hover:text-white font-bold group btn-press shadow-inner">
                                                        <div className="flex items-center gap-4">
                                                            <div className="w-10 h-10 rounded-full flex items-center justify-center border transition-colors group-hover:border-white/30" style={{background: 'rgba(255,255,255,0.05)', borderColor: 'rgba(255,255,255,0.1)'}}>

                                            <div className="flex items-center gap-4 pointer-events-auto">
                                                <button onClick={() => { triggerHaptic(); setToastMessage("Tua lùi 10s (Chỉ khả dụng ở Premium Server)"); setTimeout(()=>setToastMessage(null),2000); }} className="w-10 h-10 rounded-full bg-white/10 hover:bg-white/30 backdrop-blur-md flex items-center justify-center text-white transition-colors tooltip btn-press" title="Tua lại 10 giây">
                                                    <i className="fas fa-undo-alt text-sm"></i>
                                                </button>
                                                <button onClick={() => { triggerHaptic(); setToastMessage("Tua tới 10s (Chỉ khả dụng ở Premium Server)"); setTimeout(()=>setToastMessage(null),2000); }} className="w-10 h-10 rounded-full bg-white/10 hover:bg-white/30 backdrop-blur-md flex items-center justify-center text-white transition-colors tooltip btn-press" title="Tua tới 10 giây">
                                                    <i className="fas fa-redo-alt text-sm"></i>
                                                </button>
                                            </div>
                                            <div className="flex items-center gap-3 pointer-events-auto">
                                                {/* NÂNG CẤP PLAYER: Nút PIP ảo */}
                                                <button onClick={() => { triggerHaptic(); setToastMessage("Bật Picture-in-Picture (Yêu cầu API Trình duyệt)"); setTimeout(()=>setToastMessage(null),2000); }} className="w-10 h-10 rounded-full bg-white/10 hover:bg-white/30 backdrop-blur-md flex items-center justify-center text-white transition-colors tooltip btn-press hidden md:flex" title="Picture in Picture">
                                                    <i className="fas fa-external-link-square-alt text-sm"></i>
                                                </button>
                                                <button onClick={() => triggerHaptic()} className="px-4 py-2 bg-white/10 hover:bg-white/30 text-white text-xs font-bold uppercase tracking-wider rounded-lg backdrop-blur-md transition-colors btn-press">Bỏ qua Intro</button>
                                            </div>
                                        </div>
                                    </div>

                                    <iframe src={isTV ? `https://vidsrc.${server}/embed/tv/${activeId}/${season}/${episode}` : `https://vidsrc.${server}/embed/movie/${activeId}`} className="w-full h-full relative z-30" allowFullScreen title="Trình phát video"></iframe>
                                </div>
                                
                                <div className={`flex gap-3 justify-center flex-wrap ${isCinemaMode ? 'absolute -bottom-20 left-1/2 -translate-x-1/2 w-max' : ''}`}>
                                    {[{id:'to', name:'Server TO'}, {id:'me', name:'Server ME'}].map((srv) => (
                                        <button key={srv.id} onClick={() => { triggerHaptic(); setServer(srv.id); }} className={`px-6 py-3 text-sm font-bold btn-press tracking-wide ${server === srv.id ? 'btn-primary' : 'bg-white/5 border border-white/10 text-white/60 hover:text-white hover:bg-white/10'}`} style={{borderRadius: '999px'}}><i className="fas fa-server mr-2 text-[10px]"></i>{srv.name}</button>
                                    ))}
                                    
                                    <button onClick={() => { triggerHaptic(); setIsCinemaMode(!isCinemaMode); }} className={`px-6 py-3 text-sm font-bold btn-press tracking-wide flex items-center gap-2 transition-colors ${isCinemaMode ? 'text-white shadow-[0_0_15px_var(--accent-primary)] border-transparent' : 'bg-white/5 border border-white/10 text-white/60 hover:text-white hover:bg-white/10'}`} style={{borderRadius: '999px', background: isCinemaMode ? 'var(--accent-primary)' : ''}}>
                                        <i className={`fas fa-lightbulb ${isCinemaMode ? 'text-yellow-300' : ''}`}></i> Cinema Mode
                                    </button>

                                    {isTV && episode < episodeCount && !isCinemaMode && (
                                        <button onClick={() => { triggerHaptic(); setEpisode(ep => ep + 1); }} className="px-6 py-3 text-sm font-bold btn-press tracking-wide text-white border-transparent flex items-center shadow-lg" style={{borderRadius: '999px', background: 'linear-gradient(to right, var(--accent-primary), var(--accent-secondary))'}}>
                                            Tập tiếp theo <i className="fas fa-step-forward ml-2 text-xs"></i>
                                        </button>
                                    )}
                                </div>
                                
                                {!isCinemaMode && isTV && (
                                    <div className="iphone-glass p-8 w-full max-w-4xl mx-auto shadow-[0_20px_40px_rgba(0,0,0,0.4)] slide-fade-stagger">
                                        <div className="flex items-center justify-between mb-6">
                                            <h3 className="font-black text-xl text-white tracking-tight">Chọn tập phim</h3>
                                            <div className="flex items-center gap-3 bg-black/30 px-4 py-2 border border-white/10" style={{borderRadius: 'var(--ios-radius-sm)'}}>
                                                <span className="text-sm text-white/60 font-bold uppercase tracking-wider">Mùa</span>
                                                {availableSeasons.length > 0 ? (
                                                    <select aria-label="Chọn mùa phim" value={season} onChange={(e) => { triggerHaptic(); setSeason(parseInt(e.target.value)); setEpisode(1); }} className="bg-transparent text-white text-lg font-black outline-none text-center cursor-pointer" style={{boxShadow: 'none'}}>
                                                        {availableSeasons.map(s => <option key={s.season_number} value={s.season_number} className="bg-slate-900 text-sm">{s.season_number}</option>)}
                                                    </select>
                                                ) : (
                                                    <input type="number" aria-label="Nhập số mùa" min="1" value={season} onChange={(e) => { triggerHaptic(); setSeason(parseInt(e.target.value) || 1); setEpisode(1); }} className="w-12 bg-transparent text-white text-lg font-black outline-none text-center" style={{boxShadow: 'none'}} />
                                                )}
                                            </div>
                                        </div>
                                        <div className="flex flex-wrap gap-3 max-h-[300px] overflow-y-auto scrollbar-hide pr-2">
                                            {[...Array(episodeCount || 24)].map((_, i) => (
                                                <button key={i} onClick={() => { triggerHaptic(); setEpisode(i + 1); }} className={`w-14 h-14 font-black text-base btn-press shrink-0 transition-colors ${episode === i + 1 ? 'shadow-[0_0_15px_var(--accent-primary)] text-white' : 'bg-white/5 border border-white/10 text-white/70 hover:text-white hover:bg-white/10'}`} style={{borderRadius: '16px', background: episode === i + 1 ? 'var(--accent-primary)' : '', borderColor: episode === i + 1 ? 'var(--accent-primary)' : ''}}>{i + 1}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {!isCinemaMode && <MovieFeedback movieId={activeId} />}
                            </div>
                        </div>
                    )}

                    {selectedMovie && (
                        <div className="modal-overlay fixed inset-0 flex items-center justify-center p-4 md:p-8 z-[200]">
                            <div className="modal-backdrop-blur" style={{backgroundImage: `url(${IMG_PATH + (selectedMovie.backdrop_path || selectedMovie.backdrop)})`}}></div>
                            
                            <div className="w-full max-w-6xl bg-black/50 backdrop-blur-3xl overflow-hidden relative flex flex-col md:flex-row modal-spring border border-white/15 shadow-[0_50px_100px_rgba(0,0,0,0.9)] z-10" style={{borderRadius: 'calc(var(--ios-radius) + 12px)'}}>
                                <button onClick={() => { triggerHaptic(); setSelectedMovie(null) }} className="absolute top-6 right-6 w-12 h-12 rounded-full bg-black/40 backdrop-blur-xl text-white/80 z-50 flex items-center justify-center btn-press hover:bg-white/20 hover:text-white border border-white/20 transition-all shadow-lg" aria-label="Đóng chi tiết phim"><i className="fas fa-times text-xl"></i></button>
                                
                                <div className="w-full h-72 md:h-auto md:w-[35%] relative shrink-0">
                                    <img src={selectedMovie.poster_path ? (selectedMovie.poster_path.startsWith('http') ? selectedMovie.poster_path : IMG_PATH + selectedMovie.poster_path) : 'https://via.placeholder.com/600x900'} loading="lazy" decoding="async" className="absolute inset-0 w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#000000] via-[#000000]/50 to-transparent md:bg-gradient-to-r md:from-transparent md:via-[#000000]/60 md:to-black/90"></div>
                                </div>

                                <div className="w-full md:w-[65%] p-8 md:p-12 flex flex-col bg-transparent relative z-10 max-h-[85vh] overflow-y-auto scrollbar-hide">
                                    
                                    {movieExtData.trailer && showTrailer ? (
                                        <div className="w-full aspect-video rounded-2xl overflow-hidden mb-8 border border-white/20 shadow-lg relative">
                                            <button onClick={() => setShowTrailer(false)} className="absolute top-2 right-2 z-50 bg-black/50 hover:bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center transition-colors"><i className="fas fa-times"></i></button>
                                            <iframe src={`https://www.youtube.com/embed/${movieExtData.trailer}?autoplay=1`} className="w-full h-full" allowFullScreen allow="autoplay"></iframe>
                                        </div>
                                    ) : null}

                                    <h2 className="text-4xl md:text-6xl font-black mb-5 text-white leading-tight drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)] tracking-tighter">{selectedMovie.title || selectedMovie.name}</h2>
                                    
                                    {selectedMovie.genre_ids && (
                                        <div className="flex flex-wrap gap-2 mb-6">
                                            {selectedMovie.genre_ids.map(id => <span key={id} className="px-4 py-1.5 text-[11px] font-black bg-white/10 border border-white/20 rounded-full text-white backdrop-blur-md uppercase tracking-widest shadow-sm">{GENRES[id] || "Phim"}</span>)}
                                        </div>
                                    )}

                                    {/* NÂNG CẤP CHI TIẾT: Phân cấp Typography rõ rệt hơn */}
                                    <div className="flex items-center gap-5 mb-8 text-sm text-white/40 font-bold uppercase tracking-widest">
                                        <span className="flex items-center gap-2 text-yellow-400 bg-yellow-400/10 px-3 py-1.5 rounded-xl border border-yellow-400/20 shadow-[0_0_15px_rgba(250,204,21,0.2)]"><i className="fas fa-star drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]"></i> {selectedMovie.vote_average?.toFixed(1) || "N/A"}</span>
                                        <span className="w-1.5 h-1.5 rounded-full bg-white/20"></span>
                                        <span className="bg-white/5 px-3 py-1.5 rounded-xl border border-white/5 text-white/60">{selectedMovie.release_date?.split('-')[0] || selectedMovie.first_air_date?.split('-')[0] || "2026"}</span>
                                        
                                        {movieExtData.trailer && !showTrailer && (
                                            <>
                                                <span className="w-1.5 h-1.5 rounded-full bg-white/20"></span>
                                                <button onClick={() => setShowTrailer(true)} className="flex items-center gap-2 transition-colors btn-press" style={{color: 'var(--accent-secondary)'}}><i className="fab fa-youtube"></i> Xem Trailer</button>
                                            </>
                                        )}
                                    </div>
                                    
                                    <p className="text-base text-white/70 mb-8 leading-relaxed font-medium">{selectedMovie.overview || "Đang cập nhật nội dung chi tiết cho bộ phim này. Hãy quay lại sau nhé!"}</p>
                                    
                                    {movieExtData.cast.length > 0 && (
                                        <div className="mb-10">
                                            <h4 className="text-white/40 text-xs font-black uppercase tracking-widest mb-4">Diễn viên chính</h4>
                                            <div className="flex gap-4 overflow-x-auto cast-scroll pb-2">
                                                {movieExtData.cast.map(actor => (
                                                    <div key={actor.id} className="flex flex-col items-center shrink-0 w-[72px]">
                                                        <div className="w-16 h-16 rounded-full overflow-hidden border border-white/10 mb-2 shadow-inner">
                                                            <img src={actor.profile_path ? `https://image.tmdb.org/t/p/w185${actor.profile_path}` : 'https://via.placeholder.com/150'} loading="lazy" decoding="async" className="w-full h-full object-cover" />
                                                        </div>
                                                        <span className="text-white/80 text-[10px] font-bold text-center leading-tight truncate w-full">{actor.name}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {movieExtData.similar.length > 0 && (
                                        <div className="mb-10">
                                            <h4 className="text-white/40 text-xs font-black uppercase tracking-widest mb-4">Phim tương tự</h4>
                                            <div className="flex gap-4 overflow-x-auto cast-scroll pb-4">
                                                {movieExtData.similar.map((sim, idx) => (
                                                    <div key={sim.id} onClick={() => handleOpenModal(sim)} className="shrink-0 w-[120px] cursor-pointer group btn-press">
                                                        <img src={sim.poster_path ? `https://image.tmdb.org/t/p/w300${sim.poster_path}` : 'https://via.placeholder.com/200x300'} loading="lazy" decoding="async" className="w-full aspect-[2/3] object-cover rounded-xl border border-white/10 group-hover:border-[var(--accent-primary)] transition-colors shadow-lg" />
                                                        <p className="text-white/60 group-hover:text-white text-[11px] font-bold mt-2 truncate">{sim.title || sim.name}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <div className="flex gap-4 mt-auto border-t border-white/10 pt-8">
                                        <button onClick={() => handleSelectMedia(selectedMovie, !!selectedMovie.first_air_date || selectedMovie.isTV)} className="flex-1 md:flex-none px-10 py-5 btn-primary font-black tracking-widest uppercase text-white btn-press flex items-center justify-center gap-3 shadow-lg hover:scale-[1.02]" aria-label="Xem phim này ngay"><i className="fas fa-play text-xl"></i> Xem ngay</button>
                                        
                                        <button onClick={() => { 
                                            triggerHaptic(); 
                                            navigator.clipboard.writeText(window.location.href);
                                            setToastMessage("Đã sao chép liên kết phim!");
                                            setTimeout(() => setToastMessage(null), 3000);
                                        }} className="w-[64px] h-[64px] bg-white/5 border border-white/10 flex items-center justify-center btn-press hover:bg-white/10 transition-colors shadow-lg" style={{borderRadius: 'var(--ios-radius-sm)'}} aria-label="Chia sẻ phim">
                                            <i className="fas fa-share-alt text-xl text-white/80"></i>
                                        </button>

                                        <button onClick={(e) => {
                                                triggerHaptic();
                                                const btn = e.currentTarget; const icon = btn.querySelector('i');
                                                globalStore.set({ isSyncing: true }); const currentFavs = globalStore.get().favorites;
                                                let newFavs = currentFavs.some(f => f.id === selectedMovie.id) ? currentFavs.filter(f => f.id !== selectedMovie.id) : [selectedMovie, ...currentFavs];
                                                icon.className = currentFavs.some(f => f.id === selectedMovie.id) ? "far fa-heart text-2xl transition-all text-white/80" : "fas fa-heart text-2xl heart-active";
                                                globalStore.set({ favorites: newFavs }); localStorage.setItem('lavender_favorites', JSON.stringify(newFavs));
                                                setTimeout(() => globalStore.set({ isSyncing: false }), 400);
                                            }} className="w-[64px] h-[64px] bg-white/5 border border-white/10 flex items-center justify-center btn-press hover:bg-white/10 transition-colors shadow-lg" style={{borderRadius: 'var(--ios-radius-sm)'}} aria-label="Thêm vào danh sách yêu thích">
                                            <i className={`fa-heart text-2xl transition-all ${favorites.some(f => f.id === selectedMovie.id) ? 'fas heart-active' : 'far text-white/80'}`}></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <FeedbackWidget />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'lavender-pwa-v1';
                    self.addEventListener('install', e => {
                        e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(['/'])));
                    });
                    self.addEventListener('fetch', e => {
                        if (e.request.method !== 'GET') return;
                        e.respondWith(
                            caches.match(e.request).then(response => {
                                return response || fetch(e.request).then(fetchRes => {
                                    return caches.open(CACHE_NAME).then(cache => {
                                        if (e.request.url.startsWith('http')) cache.put(e.request, fetchRes.clone());
                                        return fetchRes;
                                    });
                                });
                            }).catch(() => new Response('Offline mode: Không có kết nối mạng.'))
                        );
                    });
                `;
                const blob = new Blob([swCode], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob))
                    .then(reg => console.log('✅ Background Sync & Offline Mode ready.'))
                    .catch(err => console.error('❌ Service Worker registration failed.', err));
            });
        }
    </script>
</body>
</html>
