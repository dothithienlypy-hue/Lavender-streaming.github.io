    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --glass-bg: rgba(20, 20, 22, 0.45);
            --input-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --glass-shadow: rgba(0, 0, 0, 0.8);
            --glass-deep-bg: rgba(10, 10, 12, 0.65);
            
            --accent-primary: #818cf8;
            --accent-secondary: #f472b6; 
            --state-success: #34d399;
            --state-error: #ff453a;
            --state-warning: #ffd60a;
            
            --ios-radius: 44px;
            --ios-radius-sm: 24px;
            
            --glass-blur: 60px;
        }

        .light-mode {
            --bg-color: #f2f2f7;
            --text-color: #000000;
            --glass-bg: rgba(255, 255, 255, 0.55);
            --input-bg: rgba(0, 0, 0, 0.04);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-highlight: rgba(255, 255, 255, 0.9);
            --glass-shadow: rgba(0, 0, 0, 0.05);
            --glass-deep-bg: rgba(255, 255, 255, 0.75);
        }

        @media (pointer: fine) {
            /* body, a, button, input, textarea, .cursor-pointer { cursor: none !important; } */
        }
        
        .custom-cursor {
            display: none !important; 
            position: fixed; width: 14px; height: 14px; border-radius: 50%;
            background: var(--accent-primary); pointer-events: none; z-index: 999999;
            transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, background-color 0.2s;
            mix-blend-mode: screen; box-shadow: 0 0 15px var(--accent-primary);
            will-change: transform, width, height;
        }
        .custom-cursor.hovering {
            width: 40px; height: 40px; background: transparent;
            border: 2px solid var(--accent-secondary); 
            box-shadow: 0 0 20px var(--accent-secondary), inset 0 0 10px var(--accent-secondary);
        }

        .noise-bg {
            position: fixed; inset: 0; pointer-events: none; z-index: 9998; opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            will-change: transform;
        }

        body { 
            font-family: 'Be Vietnam Pro', -apple-system, sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            overflow-x: hidden;
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 40% 50%, rgba(99, 102, 241, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 70% 30%, rgba(244, 114, 182, 0.08) 0%, transparent 35%),
                radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
            filter: blur(60px) url(#goo); 
            z-index: -1;
            pointer-events: none;
            animation: liquid-bg-ios 25s infinite ease-in-out alternate;
            will-change: transform, filter;
        }

        @keyframes liquid-bg-ios {
            0% { transform: rotate(0deg) scale(1) translate(0, 0); }
            50% { transform: rotate(15deg) scale(1.1) translate(-2%, 3%); }
            100% { transform: rotate(30deg) scale(1.2) translate(2%, -3%); }
        }

        h1, h2, h3, h4, h5, h6 { line-height: 1.2; letter-spacing: -0.03em; }
        p, span, div { line-height: 1.5; }

        .iphone-glass, .nav-container {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(var(--glass-blur)) saturate(250%) !important;
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(250%) !important;
            border: 0.5px solid var(--glass-border) !important;
            border-top: 0.5px solid var(--glass-highlight) !important;
            border-radius: var(--ios-radius) !important;
            box-shadow: 
                0 30px 60px -15px var(--glass-shadow), 
                inset 0 2px 10px rgba(255, 255, 255, 0.03) !important;
        }
        
        .nav-container {
            border-radius: 999px !important; 
            padding: 8px 12px 8px 24px !important;
        }

        .glass-deep {
            background: var(--glass-deep-bg);
            backdrop-filter: blur(80px) saturate(300%);
            -webkit-backdrop-filter: blur(80px) saturate(300%);
            border: 0.5px solid var(--glass-border);
            border-radius: var(--ios-radius);
            box-shadow: 
                0 40px 80px -20px var(--glass-shadow), 
                inset 0 4px 20px rgba(0, 0, 0, 0.5), 
                inset 0 1px 1px rgba(255, 255, 255, 0.2);
        }

        .btn-press {
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-origin: center;
        }
        .btn-press:hover { transform: scale(1.03); }
        .btn-press:active {
            transform: scale(0.92) !important;
            transition: all 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
            filter: brightness(0.8);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            box-shadow: 0 10px 20px -5px var(--accent-primary), inset 0 2px 5px rgba(255,255,255,0.3);
            border: 0.5px solid rgba(255, 255, 255, 0.3);
            color: white; font-weight: 800; border-radius: 999px;
            transition: box-shadow 0.3s ease;
        }

        @keyframes iosWaterDropReveal {
            0% {
                opacity: 0;
                transform: scale(0.85) translateY(20px);
                filter: blur(20px);
                clip-path: circle(5% at 50% 80%); 
            }
            40% { opacity: 1; filter: blur(5px); }
            100% {
                opacity: 1; transform: scale(1) translateY(0); filter: blur(0px);
                clip-path: circle(150% at 50% 50%); 
            }
        }
        
        .slide-fade-stagger {
            opacity: 0;
            animation: iosWaterDropReveal 0.85s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            will-change: transform, opacity, filter, clip-path;
        }

        @keyframes modalLiquidSpring {
            0% { transform: scale(0.8) translateY(60px); opacity: 0; clip-path: circle(10% at 50% 100%); filter: blur(15px); }
            60% { transform: scale(1.02) translateY(-5px); opacity: 1; clip-path: circle(120% at 50% 50%); filter: blur(0px); }
            100% { transform: scale(1) translateY(0); opacity: 1; clip-path: circle(150% at 50% 50%); }
        }
        .modal-spring { 
            animation: modalLiquidSpring 0.7s cubic-bezier(0.24, 1.2, 0.64, 1) forwards; 
            will-change: transform, opacity;
        }

        .movie-card {
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s ease, border-radius 0.4s ease;
            transform-origin: center; transform-style: preserve-3d;
            border: 0.5px solid rgba(255, 255, 255, 0.15); 
            border-top: 0.5px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--ios-radius-sm) !important; 
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6), inset 0 2px 10px rgba(255,255,255,0.05);
            cursor: pointer; position: relative; overflow: hidden;
            background: #000;
            will-change: transform;
        }

        .movie-card:active { transform: scale(0.93) !important; border-radius: 36px !important; }

        @media (min-width: 768px) {
            .movie-card { border-radius: var(--ios-radius-sm) !important; }
            .movie-card:hover { 
                z-index: 50; 
                box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.9), 0 0 40px var(--accent-primary); 
            }
        }

        @keyframes shimmerLiquid {
            0% { transform: translateX(-150%) skewX(-15deg); }
            100% { transform: translateX(150%) skewX(-15deg); }
        }
        .skeleton {
            background-color: rgba(255, 255, 255, 0.05);
            position: relative; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: var(--ios-radius-sm) !important;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
        }
        .skeleton::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmerLiquid 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .lavender-text {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px var(--accent-primary);
        }

        .lavender-gradient {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.4);
        }

        input, textarea, select {
            background-color: var(--input-bg) !important; color: var(--text-color) !important;
            box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.5); 
            border-radius: 20px !important;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: blur(20px);
        }
        
        input:focus, textarea:focus {
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2), 0 0 0 3px var(--accent-primary);
            background-color: rgba(255,255,255,0.12) !important;
        }

        .scroll-container {
            display: flex; overflow-x: auto; scroll-behavior: smooth;
            -ms-overflow-style: none; scrollbar-width: none; scroll-snap-type: x mandatory;
            padding-bottom: 40px; padding-top: 20px; padding-left: 20px; padding-right: 20px;
        }
        
        @media (min-width: 768px) { .scroll-container { padding-left: 48px; padding-right: 48px; } }
        .scroll-container::-webkit-scrollbar { display: none; }
        .scroll-item { scroll-snap-align: start; flex-shrink: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        @keyframes heartPop {
            0% { transform: scale(1); }
            40% { transform: scale(1.6) rotate(-15deg); filter: drop-shadow(0 0 20px rgba(255, 69, 58, 1)); }
            60% { transform: scale(1.1) rotate(10deg); }
            100% { transform: scale(1) rotate(0); filter: drop-shadow(0 0 10px rgba(255, 69, 58, 0.8)); }
        }
        .heart-active { animation: heartPop 0.5s cubic-bezier(0.24, 1.2, 0.64, 1) forwards; color: var(--state-error) !important; }

        .info-overlay {
            opacity: 0; transition: opacity 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 60%, transparent 100%); z-index: 20;
        }
        .movie-card:hover .info-overlay { opacity: 1; }

        .fav-btn { position: absolute; top: 12px; right: 12px; z-index: 60; opacity: 0; transition: all 0.3s ease; }
        .movie-card:hover .fav-btn { opacity: 1; }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%); 
            z-index: 200;
        }

        .modal-backdrop-blur {
            position: absolute; inset: 0; z-index: 0; background-size: cover; background-position: center;
            filter: blur(100px) brightness(0.3); transform: scale(1.2);
            opacity: 0.6;
        }
        
        .search-bar-focus { 
            box-shadow: 0 0 0 2px var(--accent-primary), 0 15px 35px -10px var(--accent-primary); 
            background: rgba(30, 30, 35, 0.8) !important;
        }

        .search-result-item.active {
            background-color: rgba(255,255,255,0.15);
            border-left: 3px solid var(--accent-primary);
        }

        .mask-image-bottom {
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }

        .cast-scroll::-webkit-scrollbar { height: 6px; }
        .cast-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .trailer-overlay { background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 250; }
        .custom-player-controls {
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .player-container:hover .custom-player-controls { opacity: 1; }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .mesh-login-bg {
            background: linear-gradient(-45deg, var(--accent-primary), var(--accent-secondary), #0f172a, #000000);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }
        @keyframes iosShake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
            20%, 40%, 60%, 80% { transform: translateX(6px); }
        }
        .animate-shake {
            animation: iosShake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        .caret-lavender {
            caret-color: var(--accent-primary);
        }

        /* --- TỐI ƯU HÓA HIỆU NĂNG MƯỢT MÀ (CHỈ THÊM VÀO) --- */
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        html {
            scroll-behavior: smooth;
            overscroll-behavior-y: none; /* Chống giật lag pull-to-refresh trên mobile */
        }
        .movie-card, .btn-press, .scroll-item, .hero-section {
            transform: translateZ(0); /* Ép render bằng GPU để cực mượt */
            -webkit-transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            perspective: 1000px;
            -webkit-perspective: 1000px;
        }
        .scroll-container {
            -webkit-overflow-scrolling: touch; /* Lăn chuột/vuốt cực mượt trên iOS/Android */
            overscroll-behavior-x: contain;
            will-change: scroll-position;
        }
        .row-container, .grid {
            content-visibility: auto; /* Trình duyệt bỏ qua tính toán đồ họa ngoài màn hình */
            contain-intrinsic-size: 400px;
        }
        img {
            content-visibility: auto;
        }
        
        /* Tự động tắt/giảm các hiệu ứng ngốn pin và tụt FPS trên điện thoại */
        @media (max-width: 768px) {
            .iphone-glass, .nav-container, .glass-deep, .modal-overlay, .backdrop-blur-xl, .backdrop-blur-md, .backdrop-blur-3xl {
                backdrop-filter: blur(12px) saturate(150%) !important;
                -webkit-backdrop-filter: blur(12px) saturate(150%) !important;
            }
            body::before {
                filter: blur(30px) url(#goo);
                animation-duration: 40s; /* Làm chậm animation background để đỡ tốn CPU */
            }
            .movie-card:hover { transform: none !important; } /* Tắt hover 3D trên mobile để tránh rác GPU */
        }
        /* --------------------------------------------------- */

    </style>
</head>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const API_KEY = "42943f9ce70074a70d6fb6c2ce3b5188"; 
        const BASE_URL = "https://api.themoviedb.org/3";
        const IMG_PATH = "https://image.tmdb.org/t/p/original";
        const USER_AVATAR = "https://cdn2.fptshop.com.vn/unsafe/800x0/avatar_anime_nam_cute_14_60037b48e5.jpg";

        const MOVIE_AVATARS = [
            USER_AVATAR,
            "https://i.pinimg.com/736x/8f/58/06/8f5806c9a6332ea5232d96ab29b0a7c4.jpg", 
            "https://i.pinimg.com/736x/21/df/b2/21dfb2569c73336ebecbc8bb3ce2c1b1.jpg", 
            "https://i.pinimg.com/736x/d6/9e/10/d69e102607998393e878516ee71cb32b.jpg", 
            "https://i.pinimg.com/736x/32/cb/76/32cb7646a78ea330c68ab2213a0fc3f0.jpg"  
        ];

        const MOCK_DEVICES = [
            { id: 1, name: "Trình duyệt Chrome (Windows 11)", location: "Hà Nội, VN", current: true, time: "Đang hoạt động", icon: "fa-laptop" },
            { id: 2, name: "Safari (iPhone 14 Pro)", location: "Hà Nội, VN", current: false, time: "2 giờ trước", icon: "fa-mobile-alt" },
            { id: 3, name: "Ứng dụng Lavender (Smart TV)", location: "Hồ Chí Minh, VN", current: false, time: "Hôm qua", icon: "fa-tv" }
        ];

        const GENRES = { 28: "Hành động", 12: "Phiêu lưu", 16: "Hoạt hình", 35: "Hài kịch", 80: "Tội phạm", 99: "Tài liệu", 18: "Chính kịch", 10751: "Gia đình", 14: "Kỳ ảo", 36: "Lịch sử", 27: "Kinh dị", 10402: "Âm nhạc", 9648: "Bí ẩn", 10749: "Lãng mạn", 878: "Viễn tưởng", 10770: "Truyền hình", 53: "Giật gân", 10752: "Chiến tranh", 37: "Miền Tây", 10759: "Action & Adventure", 10762: "Kids", 10765: "Sci-Fi & Fantasy", 10768: "War & Politics" };

        const createGlobalStore = (initialState) => {
            let state = initialState;
            const listeners = new Set();
            const get = () => state;
            const set = (partial) => { state = { ...state, ...partial }; listeners.forEach(listener => listener(state)); };
            const useStore = () => {
                const [localState, setLocalState] = useState(state);
                useEffect(() => { listeners.add(setLocalState); return () => listeners.delete(setLocalState); }, []);
                return localState;
            };
            return { useStore, set, get };
        };

        const globalStore = createGlobalStore({
            isDarkMode: JSON.parse(localStorage.getItem('lavender_theme') ?? 'true'),
            language: localStorage.getItem('lavender_lang') || 'vi',
            
            accentColor: localStorage.getItem('lavender_accent') || 'lavender',
            glassIntensity: parseInt(localStorage.getItem('lavender_glass') || '60'),
            
            favorites: JSON.parse(localStorage.getItem('lavender_favorites') || '[]'),
            isSyncing: false,
            currentUser: JSON.parse(localStorage.getItem('lavender_active_user') || 'null'),
            globalLoading: false,
            globalError: null
        });

        const triggerHaptic = () => {
            if (typeof navigator !== 'undefined' && navigator.vibrate) {
                navigator.vibrate(50);
            }
        };

        const highlightText = (text, query) => {
            if (!query || !text) return text;
            const parts = text.split(new RegExp(`(${query})`, 'gi'));
            return (
                <span>
                    {parts.map((part, i) => 
                        part.toLowerCase() === query.toLowerCase() ? 
                        <b key={i} className="text-purple-400" style={{color: 'var(--accent-primary)'}}>{part}</b> : part
                    )}
                </span>
            );
        };

        const CustomCursor = () => {
            const cursorRef = useRef(null);
            
            useEffect(() => {
                if (window.matchMedia("(pointer: coarse)").matches) return; 
                
                let animationFrameId;
                const moveCursor = (e) => {
                    if (animationFrameId) cancelAnimationFrame(animationFrameId);
                    animationFrameId = requestAnimationFrame(() => {
                        if (cursorRef.current) {
                            cursorRef.current.style.left = e.clientX + 'px';
                            cursorRef.current.style.top = e.clientY + 'px';
                        }
                    });
                };
                const handleMouseOver = (e) => {
                    if (cursorRef.current) {
                        const isInteractable = e.target.closest('a, button, input, textarea, select, .cursor-pointer, .movie-card, .btn-press, .profile-tab-btn');
                        if (isInteractable) cursorRef.current.classList.add('hovering');
                        else cursorRef.current.classList.remove('hovering');
                    }
                };
                window.addEventListener('mousemove', moveCursor, { passive: true });
                window.addEventListener('mouseover', handleMouseOver, { passive: true });
                return () => {
                    window.removeEventListener('mousemove', moveCursor);
                    window.removeEventListener('mouseover', handleMouseOver);
                    if (animationFrameId) cancelAnimationFrame(animationFrameId);
                };
            }, []);
            
            return <div ref={cursorRef} className="custom-cursor hidden md:block"></div>;
        };

        const GlobalLoader = () => {
            const { globalLoading } = globalStore.useStore();
            if (!globalLoading) return null;
            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/60 backdrop-blur-xl transition-opacity">
                    <div className="iphone-glass p-8 rounded-[32px] flex flex-col items-center gap-5 shadow-[0_30px_60px_rgba(0,0,0,0.8)] border border-white/20 modal-spring">
                        <i className="fas fa-circle-notch animate-spin text-5xl drop-shadow-lg" style={{color: 'var(--accent-primary)'}}></i>
                        <span className="text-white font-black tracking-widest uppercase text-xs drop-shadow-md">Đang tải...</span>
                    </div>
                </div>
            );
        };

        const GlobalErrorUI = () => {
            const { globalError } = globalStore.useStore();
            if (!globalError) return null;
            useEffect(() => {
                if (globalError) { const timer = setTimeout(() => { globalStore.set({ globalError: null }); }, 6000); return () => clearTimeout(timer); }
            }, [globalError]);
            return (
                <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[9999] slide-fade-stagger w-[92%] max-w-md">
                    <div className="iphone-glass px-6 py-4 rounded-[28px] border-l-4 border-l-red-500 border-y border-r border-white/20 flex items-center gap-4 shadow-[0_20px_40px_rgba(239,68,68,0.4)] bg-red-500/10 backdrop-blur-xl">
                        <i className="fas fa-exclamation-triangle text-red-500 text-3xl drop-shadow-[0_0_15px_rgba(239,68,68,0.8)] shrink-0"></i>
                        <div className="flex-1">
                            <h4 className="text-white font-bold text-base tracking-wide">{globalError.title || 'Đã có lỗi xảy ra!'}</h4>
                            <p className="text-white/70 text-xs mt-1 leading-relaxed">{globalError.message}</p>
                        </div>
                        <button onClick={() => globalStore.set({ globalError: null })} className="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition-colors shrink-0 border border-white/10 btn-press" aria-label="Đóng lỗi"><i className="fas fa-times"></i></button>
                    </div>
                </div>
            );
        };

        const useInfiniteScroll = (callback, isFetching) => {
            const observer = useRef();
            const lastElementRef = useCallback(node => {
                if (isFetching) return;
                if (observer.current) observer.current.disconnect();
                observer.current = new IntersectionObserver(entries => { if (entries[0].isIntersecting) callback(); });
                if (node) observer.current.observe(node);
            }, [isFetching, callback]);
            return lastElementRef;
        };

        const useIntersectionObserver = (ref, options) => {
            const [isIntersecting, setIsIntersecting] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setIsIntersecting(true); observer.disconnect(); }
                }, options);
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [ref, options]);
            return isIntersecting;
        };

        const MovieSkeleton = ({ index = 0 }) => (
            <div className="scroll-item w-[150px] md:w-[220px] h-[220px] md:h-[320px] skeleton slide-fade-stagger" style={{ animationDelay: `${index * 0.08}s` }}></div>
        );

        const getRealProgress = (movieId) => {
            const history = JSON.parse(localStorage.getItem('lavender_history') || '[]');
            const movie = history.find(m => m.id === movieId);
            if (!movie) return 0;
            if (movie.watchedTime && movie.totalTime) return (movie.watchedTime / movie.totalTime) * 100;
            return 0;
        };

        const MovieCard = React.memo(({ m, onSelect, onOpenModal, index = 0 }) => {
            const { favorites } = globalStore.useStore();
            const cardRef = useRef(null);
            const isVisible = useIntersectionObserver(cardRef, { rootMargin: '200px' });
            
            const [tilt, setTilt] = useState({ x: 0, y: 0 });
            const [isHovered, setIsHovered] = useState(false);

            const handleMouseMove = (e) => {
                if (!cardRef.current || window.innerWidth < 768) return; 
                requestAnimationFrame(() => {
                    const rect = cardRef.current.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    setTilt({ x: -(y / rect.height) * 20, y: (x / rect.width) * 20 }); 
                });
            };

            const toggleFavorite = (e, item) => {
                triggerHaptic(); 
                e.stopPropagation();
                globalStore.set({ isSyncing: true });
                const currentFavs = globalStore.get().favorites;
                let newFavs = currentFavs.some(f => f.id === item.id) ? currentFavs.filter(f => f.id !== item.id) : [item, ...currentFavs];
                globalStore.set({ favorites: newFavs }); localStorage.setItem('lavender_favorites', JSON.stringify(newFavs));
                setTimeout(() => globalStore.set({ isSyncing: false }), 600);
            };

            const isFav = favorites.some(f => f.id === m.id);

            const dynamicStyle = {
                animationDelay: `${index * 0.05}s`,
                transform: isHovered ? `perspective(1000px) scale(1.02) rotateX(${tilt.x}deg) rotateY(${tilt.y}deg)` : 'perspective(1000px) scale(1) rotateX(0deg) rotateY(0deg)',
                transition: isHovered ? 'transform 0.1s ease-out' : 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)'
            };

            const posterUrl = m.poster_path ? (m.poster_path.startsWith('http') ? m.poster_path : `https://image.tmdb.org/t/p/w300${m.poster_path}`) : 'https://via.placeholder.com/200x300';
            const posterSrcSet = m.poster_path && !m.poster_path.startsWith('http') ? `https://image.tmdb.org/t/p/w300${m.poster_path} 300w, https://image.tmdb.org/t/p/w780${m.poster_path} 780w` : undefined;

            const isHot = m.vote_average >= 8;
            const isNew = m.release_date ? m.release_date.startsWith('2026') : (m.first_air_date && m.first_air_date.startsWith('2026'));
            const badge = isNew ? "NEW" : (isHot ? "HOT" : "4K");
            const badgeColor = isNew ? "bg-red-500" : (isHot ? "bg-orange-500" : "bg-blue-500");

            return (
                <div ref={cardRef} 
                    onClick={() => { triggerHaptic(); onOpenModal ? onOpenModal(m) : onSelect(m) }} 
                    onMouseMove={handleMouseMove}
                    onMouseEnter={() => { setIsHovered(true); triggerHaptic(); }} 
                    onMouseLeave={() => { setIsHovered(false); setTilt({x:0, y:0}); }}
                    className="movie-card group w-[150px] md:w-[220px] h-[220px] md:h-[320px] bg-slate-900 slide-fade-stagger flex-shrink-0"
                    style={dynamicStyle}
                >
                    {isVisible ? (
                        <>
                            <div className={`absolute top-3 left-3 px-2 py-0.5 rounded-md ${badgeColor} text-white text-[9px] font-black tracking-widest z-50 shadow-lg`}>{badge}</div>

                            <img src={posterUrl} srcSet={posterSrcSet} sizes="(max-width: 768px) 150px, 220px" decoding="async" className="absolute inset-0 w-full h-full object-cover transition-all duration-700 brightness-90 group-hover:brightness-50 group-hover:scale-105" loading="lazy" />
                            
                            <button onClick={(e) => toggleFavorite(e, m)} className="fav-btn w-9 h-9 rounded-full bg-black/40 backdrop-blur-xl flex items-center justify-center text-sm hover:bg-white/20 btn-press border border-white/20" aria-label="Thêm vào yêu thích">
                                <i className={`fa-heart ${isFav ? 'fas heart-active' : 'far text-white transition-all'}`}></i>
                            </button>

                            <div className="info-overlay absolute inset-0 flex flex-col justify-end p-4 md:p-5">
                                <p className="text-white text-sm md:text-base font-black mb-1.5 truncate tracking-tight relative z-30 drop-shadow-lg">{m.title || m.name}</p>
                                <div className="flex items-center gap-2.5 text-[10px] md:text-xs font-bold relative z-30 opacity-80">
                                    <span className="flex items-center gap-1 text-yellow-400 bg-black/40 px-1.5 py-0.5 rounded backdrop-blur-sm"><i className="fas fa-star"></i> {m.vote_average ? m.vote_average.toFixed(1) : "7.5"}</span>
                                    <span className="text-white/70">{m.release_date ? m.release_date.split('-')[0] : (m.first_air_date ? m.first_air_date.split('-')[0] : "2026")}</span>
                                </div>
                                
                                <div className="mt-3 flex gap-2 opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-y-4 group-hover:translate-y-0 relative z-40">
                                    <button onClick={(e) => { e.stopPropagation(); triggerHaptic(); onSelect(m); }} className="flex-1 bg-white/20 hover:bg-white/40 backdrop-blur-md border border-white/30 text-white text-[10px] md:text-xs py-1.5 rounded-lg font-bold transition-colors shadow-lg flex items-center justify-center gap-1.5 btn-press" aria-label="Xem phim">
                                        <i className="fas fa-play"></i> Xem
                                    </button>
                                    <button onClick={(e) => toggleFavorite(e, m)} className="w-8 h-8 md:w-9 md:h-9 rounded-lg bg-white/20 hover:bg-white/40 backdrop-blur-md border border-white/30 flex items-center justify-center text-white transition-colors shadow-lg btn-press" aria-label="Lưu phim">
                                        <i className={`fas ${isFav ? 'fa-check text-green-400' : 'fa-plus'}`}></i>
                                    </button>
                                </div>
                            </div>

                            {getRealProgress(m.id) > 0 && (
                                <div className="absolute bottom-0 left-0 w-full h-1.5 bg-white/20 z-40 backdrop-blur-md">
                                    <div className="h-full lavender-gradient rounded-r-full" style={{ width: `${getRealProgress(m.id)}%` }}></div>
                                </div>
                            )}
                        </>
                    ) : (
                        <div className="w-full h-full skeleton opacity-50"></div>
                    )}
                </div>
            );
        });

        const InfiniteGrid = ({ title, data, onSelect, onOpenModal, onLoadMore, isFetching }) => {
            const lastItemRef = useInfiniteScroll(onLoadMore, isFetching);
            return (
                <div className="px-6 md:px-12 mt-10">
                    <h3 className="text-xl md:text-2xl font-black mb-6 flex items-center gap-3 tracking-tighter"><span className="w-2 h-8 rounded-full shadow-lg" style={{background: 'var(--accent-primary)'}}></span> {title}</h3>
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5 md:gap-7 relative z-10">
                        {data.map((m, index) => {
                            if (index === data.length - 1) return <div ref={lastItemRef} key={`${m.id}-${index}`} className="flex justify-center"><MovieCard m={m} onSelect={onSelect} onOpenModal={onOpenModal} index={index % 20} /></div>;
                            return <div key={`${m.id}-${index}`} className="flex justify-center"><MovieCard m={m} onSelect={onSelect} onOpenModal={onOpenModal} index={index % 20} /></div>;
                        })}
                    </div>
                    {isFetching && <div className="flex justify-center mt-10 pb-6 slide-fade-stagger"><div className="bg-white/10 p-3 rounded-full backdrop-blur-md border border-white/20"><i className="fas fa-circle-notch animate-spin text-3xl" style={{color: 'var(--accent-primary)'}}></i></div></div>}
                </div>
            );
        };

        const Row = ({ title, data, onSelect, onOpenModal, isLoading, isEmptyState }) => {
            const rowRef = useRef(null);
            const isRowVisible = useIntersectionObserver(rowRef, { rootMargin: '300px' });
            return (
                <div ref={rowRef} className="row-container min-h-[250px] md:min-h-[350px]">
                    <h3 className="row-title px-6 md:px-12 text-xl md:text-2xl font-black mb-5 flex items-center gap-3 tracking-tighter"><span className="w-2 h-8 rounded-full shadow-lg" style={{background: 'var(--accent-primary)'}}></span> {title}</h3>
                    <div className="scroll-container gap-5 md:gap-7 !overflow-visible"> 
                        {isEmptyState ? (
                            <div className="flex flex-col items-center justify-center w-[90%] max-w-md py-12 glass-deep mx-auto slide-fade-stagger mt-2 border border-dashed border-white/10">
                                <div className="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-5 border border-white/10 shadow-inner"><i className="fas fa-heart-broken text-3xl text-white/20"></i></div>
                                <h4 className="text-white font-black text-lg mb-2">Chưa có mục yêu thích 💜</h4>
                                <p className="text-white/50 text-sm font-medium text-center px-6 leading-relaxed">Hãy bấm thả tim những bộ phim bạn thích để xem lại sau nhé.</p>
                            </div>
                        ) : isLoading || !isRowVisible ? [...Array(6)].map((_, i) => <MovieSkeleton key={i} index={i} />) : data && data.map((m, index) => <div key={m.id} className="scroll-item"><MovieCard m={m} onSelect={onSelect} onOpenModal={onOpenModal} index={index} /></div>)}
                    </div>
                </div>
            );
        };

        const MovieFeedback = ({ movieId }) => { 
            const { currentUser } = globalStore.useStore();
            const [reviews, setReviews] = useState([]);
            const [comment, setComment] = useState('');
            const [rating, setRating] = useState(0);
            const [hoveredRating, setHoveredRating] = useState(0);
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                const allReviews = JSON.parse(localStorage.getItem('lavender_movie_reviews') || '{}');
                setReviews(allReviews[movieId] || []);
            }, [movieId]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (rating === 0 || !comment.trim()) return;
                setIsSubmitting(true);
                setTimeout(() => {
                    const allReviews = JSON.parse(localStorage.getItem('lavender_movie_reviews') || '{}');
                    const movieReviews = allReviews[movieId] || [];
                    const newReview = { id: Date.now(), user: currentUser ? currentUser.name : "Người dùng ẩn danh", avatar: currentUser ? currentUser.avatar : USER_AVATAR, rating, comment, date: new Date().toLocaleDateString('vi-VN') };
                    const updatedReviews = [newReview, ...movieReviews];
                    allReviews[movieId] = updatedReviews;
                    localStorage.setItem('lavender_movie_reviews', JSON.stringify(allReviews));
                    setReviews(updatedReviews); setComment(''); setRating(0); setIsSubmitting(false);
                }, 600);
            };

            return (
                <div className="iphone-glass p-6 md:p-8 flex flex-col gap-6 w-full max-w-4xl mx-auto mt-6">
                    <h3 className="font-black text-lg md:text-xl text-white tracking-tight flex items-center gap-3"><i className="fas fa-comments" style={{color: 'var(--accent-primary)'}}></i> Đánh giá phim</h3>
                    <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                        <div className="flex items-center gap-2">
                            {[1, 2, 3, 4, 5].map(star => (
                                <i key={star} className={`fas fa-star text-3xl cursor-pointer transition-transform btn-press ${star <= (hoveredRating || rating) ? 'text-yellow-400 drop-shadow-[0_0_12px_rgba(250,204,21,0.8)]' : 'text-white/20'}`} onMouseEnter={() => setHoveredRating(star)} onMouseLeave={() => setHoveredRating(0)} onClick={() => { triggerHaptic(); setRating(star) }}></i>
                            ))}
                        </div>
                        <textarea placeholder="Chia sẻ cảm nghĩ của bạn về bộ phim này..." value={comment} onChange={(e) => setComment(e.target.value)} className="w-full bg-black/20 border border-white/10 p-5 text-sm text-white placeholder:text-white/40 outline-none focus:shadow-[0_0_20px_rgba(99,102,241,0.2)] transition-all resize-none h-28 backdrop-blur-xl" style={{borderRadius: '24px'}}></textarea>
                        <button type="submit" disabled={rating === 0 || !comment.trim() || isSubmitting} className="self-end px-8 py-3.5 btn-primary disabled:opacity-50 btn-press flex items-center gap-2 text-sm tracking-wide">
                            {isSubmitting ? <><i className="fas fa-circle-notch animate-spin"></i> Đang gửi</> : 'Gửi Đánh Giá'}
                        </button>
                    </form>

                    <div className="flex flex-col gap-4 mt-4 max-h-[300px] overflow-y-auto scrollbar-hide pr-2">
                        {reviews.length > 0 ? reviews.map((rev, i) => (
                            <div key={rev.id} className="bg-black/20 p-5 rounded-[28px] border border-white/10 flex gap-4 backdrop-blur-md slide-fade-stagger" style={{animationDelay: `${i*0.05}s`}}>
                                <img src={rev.avatar} alt="avatar" loading="lazy" decoding="async" className="w-12 h-12 rounded-full border-2 border-indigo-400/50 object-cover shrink-0" />
                                <div className="flex flex-col w-full">
                                    <div className="flex justify-between items-start mb-1">
                                        <span className="text-white font-bold text-sm tracking-tight">{rev.user}</span>
                                        <span className="text-white/40 text-[11px] font-medium">{rev.date}</span>
                                    </div>
                                    <div className="flex gap-1 mb-2">
                                        {[1, 2, 3, 4, 5].map(star => <i key={star} className={`fas fa-star text-[11px] ${star <= rev.rating ? 'text-yellow-400' : 'text-white/20'}`}></i>)}
                                    </div>
                                    <p className="text-white/70 text-sm leading-relaxed">{rev.comment}</p>
                                </div>
                            </div>
                        )) : (
                            <div className="text-center flex flex-col items-center justify-center py-10 text-white/40 slide-fade-stagger border border-dashed border-white/10 rounded-[28px]">
                                <i className="far fa-comment-dots text-4xl mb-4 opacity-50"></i>
                                <span className="text-sm font-medium">Chưa có đánh giá nào. Hãy là người đầu tiên!</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const FeedbackWidget = () => { 
            const { currentUser } = globalStore.useStore();
            const [isOpen, setIsOpen] = useState(false);
            const [rating, setRating] = useState(0);
            const [hoveredRating, setHoveredRating] = useState(0);
            const [comment, setComment] = useState('');
            const [email, setEmail] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);

            useEffect(() => { if (isOpen && currentUser) setEmail(currentUser.email); }, [isOpen, currentUser]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (rating === 0) return;
                setIsSubmitting(true);
                setTimeout(() => {
                    const existingFeedback = JSON.parse(localStorage.getItem('lavender_feedbacks') || '[]');
                    const newFeedback = { id: Date.now(), rating, comment, email, date: new Date().toISOString() };
                    localStorage.setItem('lavender_feedbacks', JSON.stringify([newFeedback, ...existingFeedback]));
                    setIsSubmitting(false); setIsOpen(false); setRating(0); setComment('');
                    setToastMessage("Cảm ơn bạn đã feedback! 💜");
                    setTimeout(() => setToastMessage(null), 3500);
                }, 800);
            };

            return (
                <>
                    {!isOpen && (
                        <button onClick={() => { triggerHaptic(); setIsOpen(true) }} className="fixed bottom-6 right-6 z-[150] w-14 h-14 rounded-full btn-primary shadow-lg flex items-center justify-center btn-press" aria-label="Góp ý">
                            <i className="fas fa-comment-dots text-xl"></i>
                        </button>
                    )}
                    {isOpen && (
                        <div className="fixed inset-0 z-[250] flex items-center justify-center p-4 bg-black/70 backdrop-blur-2xl">
                            <div className="glass-deep w-full max-w-sm p-8 border border-white/20 relative modal-spring shadow-[0_40px_80px_rgba(0,0,0,0.8)]">
                                <button onClick={() => setIsOpen(false)} className="absolute top-6 right-6 w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white/70 hover:text-white hover:bg-white/20 transition-all btn-press border border-white/10" aria-label="Đóng bảng góp ý"><i className="fas fa-times"></i></button>
                                <h3 className="text-2xl font-black text-white mb-6 flex items-center gap-3 tracking-tighter"><i className="fas fa-heart text-pink-400"></i> Góc Góp Ý</h3>
                                <form onSubmit={handleSubmit} className="space-y-5">
                                    <div className="flex flex-col items-center gap-3 mb-2">
                                        <p className="text-sm text-white/60 font-bold">Trải nghiệm của bạn thế nào?</p>
                                        <div className="flex gap-2">
                                            {[1, 2, 3, 4, 5].map(star => <i key={star} className={`fas fa-star text-4xl cursor-pointer btn-press ${star <= (hoveredRating || rating) ? 'text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)]' : 'text-white/20'}`} onMouseEnter={() => setHoveredRating(star)} onMouseLeave={() => setHoveredRating(0)} onClick={() => { triggerHaptic(); setRating(star) }}></i>)}
                                        </div>
                                    </div>
                                    <textarea placeholder="Bạn nghĩ gì về Lavender? (Tùy chọn)" value={comment} onChange={(e) => setComment(e.target.value)} className="w-full bg-black/20 border border-white/10 p-5 text-sm text-white placeholder:text-white/40 outline-none h-28 transition-all"></textarea>
                                    <div className="relative group"><i className="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-white/40 text-sm"></i><input type="email" placeholder="Email của bạn" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full pl-12 pr-5 py-4 outline-none border border-white/10 bg-black/20 text-sm text-white placeholder:text-white/40 transition-all" /></div>
                                    <button type="submit" disabled={rating === 0 || isSubmitting} className="w-full py-4 mt-2 btn-primary disabled:opacity-50 btn-press flex justify-center items-center gap-2 text-sm tracking-wide">{isSubmitting ? <><i className="fas fa-circle-notch animate-spin"></i> Đang gửi...</> : 'Gửi Đánh Giá'}</button>
                                </form>
                            </div>
                        </div>
                    )}
                    {toastMessage && (
                        <div className="fixed top-8 right-1/2 translate-x-1/2 md:translate-x-0 md:right-8 z-[300] iphone-glass px-6 py-4 rounded-3xl border-l-4 border-l-green-400 border-y border-r border-white/20 flex items-center gap-3 shadow-[0_20px_40px_rgba(52,211,153,0.4)] slide-fade-stagger bg-green-500/10">
                            <i className="fas fa-check-circle text-green-400 text-xl drop-shadow-[0_0_12px_rgba(52,211,153,0.8)]"></i>
                            <span className="text-white text-sm font-bold tracking-wide">{toastMessage}</span>
                        </div>
                    )}
                </>
            );
        };

        const App = () => {
            const { isDarkMode, accentColor, glassIntensity, favorites, isSyncing, currentUser, language } = globalStore.useStore();
            const [showSplash, setShowSplash] = useState(!!currentUser);
            const [page, setPage] = useState(currentUser ? 'home' : 'login'); 
            const [signUpAvatar, setSignUpAvatar] = useState(MOVIE_AVATARS[0]);
            
            const [isShaking, setIsShaking] = useState(false);
            
            const [profileTab, setProfileTab] = useState('overview'); 
            const [playerSettings, setPlayerSettings] = useState(() => JSON.parse(localStorage.getItem('lavender_player_settings') || '{"autoPlay":true, "subtitleColor":"white", "quality":"auto"}'));
            
            const [currentMood, setCurrentMood] = useState(() => localStorage.getItem('lavender_mood') || '🍿 Đang cày phim');
            const MOODS = ['🍿 Đang cày phim', '🎬 Tìm phim buồn', '😴 Sắp đi ngủ', '🥰 Đang lãng mạn', '🤯 Cần phim hack não'];
            const [favFilter, setFavFilter] = useState('all');

            const [activeId, setActiveId] = useState(null);
            const [isTV, setIsTV] = useState(false);
            const [season, setSeason] = useState(1);
            const [episode, setEpisode] = useState(1);
            const [server, setServer] = useState('to'); 
            const [searchQuery, setSearchQuery] = useState("");
