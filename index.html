<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lavender - Movie Streaming</title>
    
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href='data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Lavender%20Movie%22%2C%22short_name%22%3A%22Lavender%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23020617%22%2C%22theme_color%22%3A%22%23020617%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fui-avatars.com%2Fapi%2F%3Fname%3DL%26background%3D6366f1%26color%3Dfff%26size%3D192%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%7D%2C%7B%22src%22%3A%22https%3A%2F%2Fui-avatars.com%2Fapi%2F%3Fname%3DL%26background%3D6366f1%26color%3Dfff%26size%3D512%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D'>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --bg-color: #020617;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --input-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --glass-shadow: rgba(0, 0, 0, 0.6);
            --glass-deep-bg: rgba(10, 15, 30, 0.75);
            
            --accent-primary: #818cf8;
            --accent-secondary: #f472b6; 
            --state-success: #34d399;
            --state-error: #f87171;
            --state-warning: #fbbf24;
        }

        .light-mode {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --input-bg: rgba(0, 0, 0, 0.04);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-highlight: rgba(255, 255, 255, 0.9);
            --glass-shadow: rgba(0, 0, 0, 0.1);
            --glass-deep-bg: rgba(255, 255, 255, 0.85);
        }

        /* CURSOR EFFECT (LEVEL 3) */
        @media (pointer: fine) {
            body, a, button, input, textarea, .cursor-pointer { cursor: none !important; }
        }
        .custom-cursor {
            position: fixed; width: 14px; height: 14px; border-radius: 50%;
            background: var(--accent-primary); pointer-events: none; z-index: 999999;
            transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, background-color 0.2s;
            mix-blend-mode: screen; box-shadow: 0 0 15px var(--accent-primary);
        }
        .custom-cursor.hovering {
            width: 40px; height: 40px; background: transparent;
            border: 2px solid var(--accent-secondary); 
            box-shadow: 0 0 20px var(--accent-secondary), inset 0 0 10px var(--accent-secondary);
        }

        /* NOISE TEXTURE (LEVEL 3) */
        .noise-bg {
            position: fixed; inset: 0; pointer-events: none; z-index: 9998; opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        body { 
            font-family: 'Be Vietnam Pro', -apple-system, sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease; /* Timing đồng bộ (LEVEL 1) */
            -webkit-tap-highlight-color: transparent;
        }

        /* DYNAMIC GRADIENT BỀN BỈ HƠN (LEVEL 2) */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 40% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 70% 30%, rgba(244, 114, 182, 0.05) 0%, transparent 35%);
            z-index: -1;
            pointer-events: none;
            animation: liquid-bg 20s infinite linear alternate; /* Tốc độ sống động hơn */
        }

        @keyframes liquid-bg {
            0% { transform: rotate(0deg) scale(1); background-position: 0% 0%; }
            50% { transform: rotate(10deg) scale(1.05); background-position: 100% 100%; }
            100% { transform: rotate(20deg) scale(1.15); background-position: 50% 50%; }
        }

        h1, h2, h3, h4, h5, h6 { line-height: 1.2; letter-spacing: -0.02em; }
        p, span, div { line-height: 1.5; }

        /* INNER SHADOW SÂU HƠN (LEVEL 1) */
        .iphone-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 25px 50px -12px var(--glass-shadow), 
                inset 0 4px 15px rgba(0, 0, 0, 0.3), /* Tăng chiều sâu */
                inset 0 1px 1px rgba(255, 255, 255, 0.3);
        }

        .glass-deep {
            background: var(--glass-deep-bg);
            backdrop-filter: blur(70px) saturate(250%);
            -webkit-backdrop-filter: blur(70px) saturate(250%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            box-shadow: 
                0 40px 80px -20px var(--glass-shadow), 
                inset 0 4px 20px rgba(0, 0, 0, 0.5), /* Tăng chiều sâu */
                inset 0 1px 1px rgba(255, 255, 255, 0.4);
        }

        /* ANIMATION ĐỒNG BỘ ~200ms (LEVEL 1) + MICRO-INTERACTION (LEVEL 3) */
        .btn-press {
            transition: all 0.2s ease;
            transform-origin: center;
        }
        .btn-press:hover {
            transform: scale(1.02); /* Scale nhẹ chuẩn UX */
        }
        .btn-press:active {
            transform: scale(0.96) !important;
            transition: all 0.1s ease;
        }
        .btn-press i { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-press:active i { transform: scale(0.8); } /* Icon rung nhẹ khi click */

        /* SMART GLOW & GRADIENT BORDER BẬT KHI HOVER (LEVEL 1 & 2) */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            box-shadow: 0 0 0 rgba(168, 85, 247, 0), inset 0 2px 5px rgba(255,255,255,0.3); /* Idle không glow */
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; font-weight: 800;
            position: relative; z-index: 1;
        }
        .btn-primary::before {
            content: ''; position: absolute; inset: -2px; border-radius: inherit;
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary), var(--accent-primary));
            background-size: 200% auto; z-index: -1; opacity: 0; transition: opacity 0.2s ease;
            animation: borderGlow 3s linear infinite;
        }
        .btn-primary:hover {
            box-shadow: 0 10px 20px -5px rgba(168, 85, 247, 0.5); /* Glow nhẹ */
            filter: brightness(1.1); border-color: transparent;
        }
        .btn-primary:hover::before { opacity: 1; } /* Hiện gradient border */
        .btn-primary:active {
            box-shadow: 0 0 30px rgba(244, 114, 182, 0.9); /* Glow mạnh */
        }

        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-15deg); }
            100% { transform: translateX(150%) skewX(-15deg); }
        }
        .skeleton {
            background-color: rgba(255, 255, 255, 0.04);
            position: relative; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }
        .skeleton::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            animation: shimmer 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .lavender-text {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .lavender-gradient {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.4);
        }

        input, textarea {
            background-color: var(--input-bg) !important; color: var(--text-color) !important;
            box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.4); /* Inner shadow sắc nét */
            transition: all 0.2s ease;
        }

        .scroll-container {
            display: flex; overflow-x: auto; scroll-behavior: smooth;
            -ms-overflow-style: none; scrollbar-width: none; scroll-snap-type: x mandatory;
            padding-bottom: 40px; padding-top: 20px; padding-left: 20px; padding-right: 20px;
        }
        
        @media (min-width: 768px) { .scroll-container { padding-left: 48px; padding-right: 48px; } }
        .scroll-container::-webkit-scrollbar { display: none; }
        .scroll-item { scroll-snap-align: start; flex-shrink: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* MOVIE CARD ENHANCEMENTS (LEVEL 1, 2) */
        .movie-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease; /* Đồng bộ 200ms */
            transform-origin: center; transform-style: preserve-3d;
            border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), inset 0 2px 10px rgba(0,0,0,0.5); /* Inner shadow */
            cursor: pointer; position: relative; overflow: hidden;
        }

        /* Gradient Border */
        .movie-card::before {
            content: ''; position: absolute; inset: -2px; border-radius: inherit;
            background: linear-gradient(45deg, transparent, rgba(168, 85, 247, 0.8), rgba(244, 114, 182, 0.8), transparent);
            background-size: 200% 200%; z-index: -1; opacity: 0; transition: opacity 0.2s ease;
        }

        /* Light Reflection (Ánh sáng quét qua) */
        .movie-card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); transition: left 0s; pointer-events: none; z-index: 40;
        }

        .movie-card:active { transform: scale(0.96) !important; }

        @media (min-width: 768px) {
            .movie-card { border-radius: 32px; }
            .movie-card:hover { z-index: 50; box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(168, 85, 247, 0.3); }
            .movie-card:hover::before { opacity: 1; animation: borderGlow 3s ease infinite; }
            .movie-card:hover::after { left: 200%; transition: left 0.6s ease-in-out; } /* Tia sáng lướt */
        }

        @keyframes heartPop {
            0% { transform: scale(1); }
            40% { transform: scale(1.5) rotate(-15deg); filter: drop-shadow(0 0 15px rgba(239, 68, 68, 1)); }
            60% { transform: scale(1.1) rotate(10deg); }
            100% { transform: scale(1) rotate(0); filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.8)); }
        }
        .heart-active { animation: heartPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; color: var(--state-error) !important; }

        .info-overlay {
            opacity: 0; transition: opacity 0.2s ease;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 50%, transparent 100%); z-index: 20;
        }
        .movie-card:hover .info-overlay { opacity: 1; }

        .fav-btn { position: absolute; top: 12px; right: 12px; z-index: 60; opacity: 0; transition: all 0.2s ease; }
        .movie-card:hover .fav-btn { opacity: 1; }

        .modal-overlay {
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%); z-index: 200;
        }

        /* PAGE ANIMATION ~400ms (LEVEL 1) */
        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .slide-fade-stagger { opacity: 0; animation: fadeInSlideUp 0.4s ease-out forwards; }
        
        /* MODAL ANIMATION ~300ms (LEVEL 1) */
        @keyframes modalSpring {
            0% { transform: scale(0.9) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .modal-spring { animation: modalSpring 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        .modal-backdrop-blur {
            position: absolute; inset: 0; z-index: 0; background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.2); transform: scale(1.1);
        }
        
        .search-bar-focus { box-shadow: 0 0 0 2px var(--accent-primary), 0 10px 30px -10px rgba(129, 140, 248, 0.5); }

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const API_KEY = "42943f9ce70074a70d6fb6c2ce3b5188"; 
        const BASE_URL = "https://api.themoviedb.org/3";
        const IMG_PATH = "https://image.tmdb.org/t/p/original";
        const USER_AVATAR = "https://cdn2.fptshop.com.vn/unsafe/800x0/avatar_anime_nam_cute_14_60037b48e5.jpg";

        const GENRES = { 28: "Hành động", 12: "Phiêu lưu", 16: "Hoạt hình", 35: "Hài kịch", 80: "Tội phạm", 99: "Tài liệu", 18: "Chính kịch", 10751: "Gia đình", 14: "Kỳ ảo", 36: "Lịch sử", 27: "Kinh dị", 10402: "Âm nhạc", 9648: "Bí ẩn", 10749: "Lãng mạn", 878: "Viễn tưởng", 10770: "Truyền hình", 53: "Giật gân", 10752: "Chiến tranh", 37: "Miền Tây", 10759: "Action & Adventure", 10762: "Kids", 10765: "Sci-Fi & Fantasy", 10768: "War & Politics" };

        const createGlobalStore = (initialState) => {
            let state = initialState;
            const listeners = new Set();
            const get = () => state;
            const set = (partial) => { state = { ...state, ...partial }; listeners.forEach(listener => listener(state)); };
            const useStore = () => {
                const [localState, setLocalState] = useState(state);
                useEffect(() => { listeners.add(setLocalState); return () => listeners.delete(setLocalState); }, []);
                return localState;
            };
            return { useStore, set, get };
        };

        const globalStore = createGlobalStore({
            isDarkMode: JSON.parse(localStorage.getItem('lavender_theme') ?? 'true'),
            favorites: JSON.parse(localStorage.getItem('lavender_favorites') || '[]'),
            isSyncing: false,
            currentUser: JSON.parse(localStorage.getItem('lavender_active_user') || 'null'),
            globalLoading: false,
            globalError: null
        });

        /* --- CÁC COMPONENT PHỤ THUỘC --- */
        
        // LEVEL 3: Custom Cursor Effect
        const CustomCursor = () => {
            const cursorRef = useRef(null);
            
            useEffect(() => {
                if (window.matchMedia("(pointer: coarse)").matches) return; // Bỏ qua thiết bị cảm ứng
                
                const moveCursor = (e) => {
                    if (cursorRef.current) {
                        cursorRef.current.style.left = e.clientX + 'px';
                        cursorRef.current.style.top = e.clientY + 'px';
                    }
                };
                const handleMouseOver = (e) => {
                    if (cursorRef.current) {
                        const isInteractable = e.target.closest('a, button, input, textarea, .cursor-pointer, .movie-card, .btn-press');
                        if (isInteractable) cursorRef.current.classList.add('hovering');
                        else cursorRef.current.classList.remove('hovering');
                    }
                };
                window.addEventListener('mousemove', moveCursor);
                window.addEventListener('mouseover', handleMouseOver);
                return () => {
                    window.removeEventListener('mousemove', moveCursor);
                    window.removeEventListener('mouseover', handleMouseOver);
                };
            }, []);
            
            return <div ref={cursorRef} className="custom-cursor hidden md:block"></div>;
        };

        const GlobalLoader = () => {
            const { globalLoading } = globalStore.useStore();
            if (!globalLoading) return null;
            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/60 backdrop-blur-xl transition-opacity">
                    <div className="iphone-glass p-8 rounded-[32px] flex flex-col items-center gap-5 shadow-[0_30px_60px_rgba(0,0,0,0.8)] border border-white/20 modal-spring">
                        <i className="fas fa-circle-notch animate-spin text-5xl text-indigo-400 drop-shadow-[0_0_15px_rgba(99,102,241,0.6)]"></i>
                        <span className="text-white font-black tracking-widest uppercase text-xs drop-shadow-md">Đang tải...</span>
                    </div>
                </div>
            );
        };

        const GlobalErrorUI = () => {
            const { globalError } = globalStore.useStore();
            if (!globalError) return null;
            useEffect(() => {
                if (globalError) { const timer = setTimeout(() => { globalStore.set({ globalError: null }); }, 6000); return () => clearTimeout(timer); }
            }, [globalError]);
            return (
                <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[9999] slide-fade-stagger w-[92%] max-w-md">
                    <div className="iphone-glass px-6 py-4 rounded-[28px] border-l-4 border-l-red-500 border-y border-r border-white/20 flex items-center gap-4 shadow-[0_20px_40px_rgba(239,68,68,0.4)] bg-red-500/10 backdrop-blur-xl">
                        <i className="fas fa-exclamation-triangle text-red-500 text-3xl drop-shadow-[0_0_15px_rgba(239,68,68,0.8)] shrink-0"></i>
                        <div className="flex-1">
                            <h4 className="text-white font-bold text-base tracking-wide">{globalError.title || 'Đã có lỗi xảy ra!'}</h4>
                            <p className="text-white/70 text-xs mt-1 leading-relaxed">{globalError.message}</p>
                        </div>
                        <button onClick={() => globalStore.set({ globalError: null })} className="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition-colors shrink-0 border border-white/10 btn-press"><i className="fas fa-times"></i></button>
                    </div>
                </div>
            );
        };

        const useInfiniteScroll = (callback, isFetching) => {
            const observer = useRef();
            const lastElementRef = useCallback(node => {
                if (isFetching) return;
                if (observer.current) observer.current.disconnect();
                observer.current = new IntersectionObserver(entries => { if (entries[0].isIntersecting) callback(); });
                if (node) observer.current.observe(node);
            }, [isFetching, callback]);
            return lastElementRef;
        };

        const useIntersectionObserver = (ref, options) => {
            const [isIntersecting, setIsIntersecting] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) { setIsIntersecting(true); observer.disconnect(); }
                }, options);
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [ref, options]);
            return isIntersecting;
        };

        const MovieSkeleton = ({ index = 0 }) => (
            <div className="scroll-item w-[150px] md:w-[220px] h-[220px] md:h-[320px] skeleton slide-fade-stagger" style={{ animationDelay: `${index * 0.08}s` }}></div>
        );

        const getRealProgress = (movieId) => {
            const history = JSON.parse(localStorage.getItem('lavender_history') || '[]');
            const movie = history.find(m => m.id === movieId);
            if (!movie) return 0;
            if (movie.watchedTime && movie.totalTime) return (movie.watchedTime / movie.totalTime) * 100;
            return 0;
        };

        // LEVEL 2 & 1 TÍCH HỢP VÀO MOVIE CARD: Hover tilt 3D + Scale 1.02
        const MovieCard = ({ m, onSelect, onOpenModal, index = 0 }) => {
            const { favorites } = globalStore.useStore();
            const cardRef = useRef(null);
            const isVisible = useIntersectionObserver(cardRef, { rootMargin: '200px' });
            
            const [tilt, setTilt] = useState({ x: 0, y: 0 });
            const [isHovered, setIsHovered] = useState(false);

            const handleMouseMove = (e) => {
                if (!cardRef.current) return;
                const rect = cardRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                // Nghiêng nhẹ max 10 độ
                setTilt({ x: -(y / rect.height) * 20, y: (x / rect.width) * 20 }); 
            };

            const toggleFavorite = (e, item) => {
                e.stopPropagation();
                globalStore.set({ isSyncing: true });
                const currentFavs = globalStore.get().favorites;
                let newFavs = currentFavs.some(f => f.id === item.id) ? currentFavs.filter(f => f.id !== item.id) : [item, ...currentFavs];
                globalStore.set({ favorites: newFavs }); localStorage.setItem('lavender_favorites', JSON.stringify(newFavs));
                setTimeout(() => globalStore.set({ isSyncing: false }), 600);
            };

            const isFav = favorites.some(f => f.id === m.id);

            const dynamicStyle = {
                animationDelay: `${index * 0.05}s`,
                transform: isHovered ? `perspective(1000px) scale(1.02) rotateX(${tilt.x}deg) rotateY(${tilt.y}deg)` : 'perspective(1000px) scale(1) rotateX(0deg) rotateY(0deg)',
                transition: isHovered ? 'transform 0.1s ease-out' : 'transform 0.3s ease-out'
            };

            return (
                <div ref={cardRef} 
                    onClick={() => onOpenModal ? onOpenModal(m) : onSelect(m)} 
                    onMouseMove={handleMouseMove}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => { setIsHovered(false); setTilt({x:0, y:0}); }}
                    className="movie-card w-[150px] md:w-[220px] h-[220px] md:h-[320px] bg-slate-900 slide-fade-stagger flex-shrink-0"
                    style={dynamicStyle}
                >
                    {isVisible ? (
                        <>
                            <img src={m.poster_path ? (m.poster_path.startsWith('http') ? m.poster_path : IMG_PATH + m.poster_path) : 'https://via.placeholder.com/200x300'} className="absolute inset-0 w-full h-full object-cover transition-all duration-500 brightness-90 group-hover:brightness-50" loading="lazy" />
                            
                            <button onClick={(e) => toggleFavorite(e, m)} className="fav-btn w-9 h-9 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-sm hover:bg-white/20 btn-press border border-white/10">
                                <i className={`fa-heart ${isFav ? 'fas heart-active' : 'far text-white transition-all'}`}></i>
                            </button>

                            <div className="info-overlay absolute inset-0 flex flex-col justify-end p-4 md:p-5">
                                <p className="text-white text-sm md:text-base font-black mb-1.5 truncate tracking-tight relative z-30 drop-shadow-lg">{m.title || m.name}</p>
                                <div className="flex items-center gap-2.5 text-[10px] md:text-xs font-bold relative z-30 opacity-80">
                                    <span className="flex items-center gap-1 text-yellow-400 bg-black/40 px-1.5 py-0.5 rounded backdrop-blur-sm"><i className="fas fa-star"></i> {m.vote_average ? m.vote_average.toFixed(1) : "7.5"}</span>
                                    <span className="text-white/70">{m.release_date ? m.release_date.split('-')[0] : (m.first_air_date ? m.first_air_date.split('-')[0] : "2026")}</span>
                                </div>
                            </div>

                            {getRealProgress(m.id) > 0 && (
                                <div className="absolute bottom-0 left-0 w-full h-1 bg-white/20 z-40">
                                    <div className="h-full lavender-gradient" style={{ width: `${getRealProgress(m.id)}%` }}></div>
                                </div>
                            )}
                        </>
                    ) : (
                        <div className="w-full h-full skeleton opacity-50"></div>
                    )}
                </div>
            );
        };

        const InfiniteGrid = ({ title, data, onSelect, onOpenModal, onLoadMore, isFetching }) => {
            const lastItemRef = useInfiniteScroll(onLoadMore, isFetching);
            return (
                <div className="px-6 md:px-12 mt-10">
                    <h3 className="text-xl md:text-2xl font-black mb-6 flex items-center gap-3 tracking-tighter"><span className="w-2 h-8 bg-purple-500 rounded-full shadow-[0_0_12px_#a855f7]"></span> {title}</h3>
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5 md:gap-7 relative z-10">
                        {data.map((m, index) => {
                            if (index === data.length - 1) return <div ref={lastItemRef} key={`${m.id}-${index}`} className="flex justify-center"><MovieCard m={m} onSelect={onSelect} onOpenModal={onOpenModal} index={index % 20} /></div>;
                            return <div key={`${m.id}-${index}`} className="flex justify-center"><MovieCard m={m} onSelect={onSelect} onOpenModal={onOpenModal} index={index % 20} /></div>;
                        })}
                    </div>
                    {isFetching && <div className="flex justify-center mt-10 pb-6 slide-fade-stagger"><div className="bg-white/10 p-3 rounded-full backdrop-blur-md border border-white/20"><i className="fas fa-circle-notch animate-spin text-3xl text-indigo-400 drop-shadow-[0_0_10px_rgba(129,140,248,0.5)]"></i></div></div>}
                </div>
            );
        };

        const Row = ({ title, data, onSelect, onOpenModal, isLoading, isEmptyState }) => {
            const rowRef = useRef(null);
            const isRowVisible = useIntersectionObserver(rowRef, { rootMargin: '300px' });
            return (
                <div ref={rowRef} className="row-container min-h-[250px] md:min-h-[350px]">
                    <h3 className="row-title px-6 md:px-12 text-xl md:text-2xl font-black mb-5 flex items-center gap-3 tracking-tighter"><span className="w-2 h-8 bg-purple-500 rounded-full shadow-[0_0_12px_#a855f7]"></span> {title}</h3>
                    <div className="scroll-container gap-5 md:gap-7 !overflow-visible"> 
                        {isEmptyState ? (
                            <div className="flex flex-col items-center justify-center w-[90%] max-w-md py-12 glass-deep rounded-[36px] mx-auto slide-fade-stagger mt-2 border border-white/10 shadow-[0_20px_40px_rgba(0,0,0,0.5)]">
                                <div className="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-5 border border-white/10 shadow-inner"><i className="fas fa-heart-broken text-3xl text-white/20"></i></div>
                                <h4 className="text-white font-black text-lg mb-2">Chưa có mục yêu thích 💜</h4>
                                <p className="text-white/50 text-sm font-medium text-center px-6 leading-relaxed">Hãy bấm thả tim những bộ phim bạn thích để xem lại sau nhé.</p>
                            </div>
                        ) : isLoading || !isRowVisible ? [...Array(6)].map((_, i) => <MovieSkeleton key={i} index={i} />) : data && data.map((m, index) => <div key={m.id} className="scroll-item"><MovieCard m={m} onSelect={onSelect} onOpenModal={onOpenModal} index={index} /></div>)}
                    </div>
                </div>
            );
        };

        /* LƯỢC BỎ CÁC ĐOẠN ĐÃ CÓ TRONG BẢN GỐC (FEEDBACK WIDGET, MOVIE FEEDBACK) ĐỂ GIỮ NGUYÊN CẤU TRÚC LOGIC */
        const MovieFeedback = ({ movieId }) => { /* ... Giữ nguyên như cũ ... */
            const { currentUser } = globalStore.useStore();
            const [reviews, setReviews] = useState([]);
            const [comment, setComment] = useState('');
            const [rating, setRating] = useState(0);
            const [hoveredRating, setHoveredRating] = useState(0);
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                const allReviews = JSON.parse(localStorage.getItem('lavender_movie_reviews') || '{}');
                setReviews(allReviews[movieId] || []);
            }, [movieId]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (rating === 0 || !comment.trim()) return;
                setIsSubmitting(true);
                setTimeout(() => {
                    const allReviews = JSON.parse(localStorage.getItem('lavender_movie_reviews') || '{}');
                    const movieReviews = allReviews[movieId] || [];
                    const newReview = { id: Date.now(), user: currentUser ? currentUser.name : "Người dùng ẩn danh", avatar: currentUser ? currentUser.avatar : USER_AVATAR, rating, comment, date: new Date().toLocaleDateString('vi-VN') };
                    const updatedReviews = [newReview, ...movieReviews];
                    allReviews[movieId] = updatedReviews;
                    localStorage.setItem('lavender_movie_reviews', JSON.stringify(allReviews));
                    setReviews(updatedReviews); setComment(''); setRating(0); setIsSubmitting(false);
                }, 600);
            };

            return (
                <div className="iphone-glass p-6 md:p-8 rounded-[36px] md:rounded-[48px] flex flex-col gap-6 w-full max-w-4xl mx-auto mt-6">
                    <h3 className="font-black text-lg md:text-xl text-white tracking-tight flex items-center gap-3"><i className="fas fa-comments text-indigo-400"></i> Đánh giá phim</h3>
                    <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                        <div className="flex items-center gap-2">
                            {[1, 2, 3, 4, 5].map(star => (
                                <i key={star} className={`fas fa-star text-3xl cursor-pointer transition-transform btn-press ${star <= (hoveredRating || rating) ? 'text-yellow-400 drop-shadow-[0_0_12px_rgba(250,204,21,0.8)]' : 'text-white/20'}`} onMouseEnter={() => setHoveredRating(star)} onMouseLeave={() => setHoveredRating(0)} onClick={() => setRating(star)}></i>
                            ))}
                        </div>
                        <textarea placeholder="Chia sẻ cảm nghĩ của bạn về bộ phim này..." value={comment} onChange={(e) => setComment(e.target.value)} className="w-full bg-black/20 border border-white/10 rounded-[24px] p-5 text-sm text-white placeholder:text-white/40 outline-none focus:border-indigo-500/50 focus:shadow-[0_0_20px_rgba(99,102,241,0.2)] transition-all resize-none h-28 backdrop-blur-xl"></textarea>
                        <button type="submit" disabled={rating === 0 || !comment.trim() || isSubmitting} className="self-end px-8 py-3.5 rounded-[20px] btn-primary disabled:opacity-50 btn-press flex items-center gap-2 text-sm tracking-wide">
                            {isSubmitting ? <><i className="fas fa-circle-notch animate-spin"></i> Đang gửi</> : 'Gửi Đánh Giá'}
                        </button>
                    </form>

                    <div className="flex flex-col gap-4 mt-4 max-h-[300px] overflow-y-auto scrollbar-hide pr-2">
                        {reviews.length > 0 ? reviews.map((rev, i) => (
                            <div key={rev.id} className="bg-black/20 p-5 rounded-[28px] border border-white/10 flex gap-4 backdrop-blur-md slide-fade-stagger" style={{animationDelay: `${i*0.05}s`}}>
                                <img src={rev.avatar} alt="avatar" className="w-12 h-12 rounded-full border-2 border-indigo-400/50 object-cover shrink-0" />
                                <div className="flex flex-col w-full">
                                    <div className="flex justify-between items-start mb-1">
                                        <span className="text-white font-bold text-sm tracking-tight">{rev.user}</span>
                                        <span className="text-white/40 text-[11px] font-medium">{rev.date}</span>
                                    </div>
                                    <div className="flex gap-1 mb-2">
                                        {[1, 2, 3, 4, 5].map(star => <i key={star} className={`fas fa-star text-[11px] ${star <= rev.rating ? 'text-yellow-400' : 'text-white/20'}`}></i>)}
                                    </div>
                                    <p className="text-white/70 text-sm leading-relaxed">{rev.comment}</p>
                                </div>
                            </div>
                        )) : (
                            <div className="text-center flex flex-col items-center justify-center py-10 text-white/40 slide-fade-stagger border border-dashed border-white/10 rounded-[28px]">
                                <i className="far fa-comment-dots text-4xl mb-4 opacity-50"></i>
                                <span className="text-sm font-medium">Chưa có đánh giá nào. Hãy là người đầu tiên!</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const FeedbackWidget = () => { /* ... Giữ nguyên như cũ ... */
            const { currentUser } = globalStore.useStore();
            const [isOpen, setIsOpen] = useState(false);
            const [rating, setRating] = useState(0);
            const [hoveredRating, setHoveredRating] = useState(0);
            const [comment, setComment] = useState('');
            const [email, setEmail] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);

            useEffect(() => { if (isOpen && currentUser) setEmail(currentUser.email); }, [isOpen, currentUser]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (rating === 0) return;
                setIsSubmitting(true);
                setTimeout(() => {
                    const existingFeedback = JSON.parse(localStorage.getItem('lavender_feedbacks') || '[]');
                    const newFeedback = { id: Date.now(), rating, comment, email, date: new Date().toISOString() };
                    localStorage.setItem('lavender_feedbacks', JSON.stringify([newFeedback, ...existingFeedback]));
                    setIsSubmitting(false); setIsOpen(false); setRating(0); setComment('');
                    setToastMessage("Cảm ơn bạn đã feedback! 💜");
                    setTimeout(() => setToastMessage(null), 3500);
                }, 800);
            };

            return (
                <>
                    {!isOpen && (
                        <button onClick={() => setIsOpen(true)} className="fixed bottom-6 right-6 z-[150] w-14 h-14 rounded-full btn-primary shadow-[0_10px_30px_rgba(168,85,247,0.5)] flex items-center justify-center btn-press">
                            <i className="fas fa-comment-dots text-xl"></i>
                        </button>
                    )}
                    {isOpen && (
                        <div className="fixed inset-0 z-[250] flex items-center justify-center p-4 bg-black/70 backdrop-blur-2xl">
                            <div className="glass-deep w-full max-w-sm p-8 rounded-[48px] border border-white/20 relative modal-spring shadow-[0_40px_80px_rgba(0,0,0,0.8)]">
                                <button onClick={() => setIsOpen(false)} className="absolute top-6 right-6 w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white/70 hover:text-white hover:bg-white/20 transition-all btn-press border border-white/10"><i className="fas fa-times"></i></button>
                                <h3 className="text-2xl font-black text-white mb-6 flex items-center gap-3 tracking-tighter"><i className="fas fa-heart text-pink-400"></i> Góc Góp Ý</h3>
                                <form onSubmit={handleSubmit} className="space-y-5">
                                    <div className="flex flex-col items-center gap-3 mb-2">
                                        <p className="text-sm text-white/60 font-bold">Trải nghiệm của bạn thế nào?</p>
                                        <div className="flex gap-2">
                                            {[1, 2, 3, 4, 5].map(star => <i key={star} className={`fas fa-star text-4xl cursor-pointer btn-press ${star <= (hoveredRating || rating) ? 'text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)]' : 'text-white/20'}`} onMouseEnter={() => setHoveredRating(star)} onMouseLeave={() => setHoveredRating(0)} onClick={() => setRating(star)}></i>)}
                                        </div>
                                    </div>
                                    <textarea placeholder="Bạn nghĩ gì về Lavender? (Tùy chọn)" value={comment} onChange={(e) => setComment(e.target.value)} className="w-full bg-black/20 border border-white/10 rounded-[24px] p-5 text-sm text-white placeholder:text-white/40 outline-none h-28 focus:border-indigo-400/50 transition-all"></textarea>
                                    <div className="relative group"><i className="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-white/40 text-sm"></i><input type="email" placeholder="Email của bạn" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full pl-12 pr-5 py-4 rounded-[20px] outline-none border border-white/10 bg-black/20 text-sm text-white placeholder:text-white/40 focus:border-indigo-400/50 transition-all" /></div>
                                    <button type="submit" disabled={rating === 0 || isSubmitting} className="w-full py-4 mt-2 rounded-[20px] btn-primary disabled:opacity-50 btn-press flex justify-center items-center gap-2 text-sm tracking-wide">{isSubmitting ? <><i className="fas fa-circle-notch animate-spin"></i> Đang gửi...</> : 'Gửi Đánh Giá'}</button>
                                </form>
                            </div>
                        </div>
                    )}
                    {toastMessage && (
                        <div className="fixed top-8 right-1/2 translate-x-1/2 md:translate-x-0 md:right-8 z-[300] iphone-glass px-6 py-4 rounded-3xl border-l-4 border-l-green-400 border-y border-r border-white/20 flex items-center gap-3 shadow-[0_20px_40px_rgba(52,211,153,0.4)] slide-fade-stagger bg-green-500/10">
                            <i className="fas fa-check-circle text-green-400 text-xl drop-shadow-[0_0_12px_rgba(52,211,153,0.8)]"></i>
                            <span className="text-white text-sm font-bold tracking-wide">{toastMessage}</span>
                        </div>
                    )}
                </>
            );
        };

        const App = () => {
            const { isDarkMode, favorites, isSyncing, currentUser } = globalStore.useStore();
            const [page, setPage] = useState(currentUser ? 'home' : 'login'); 
            const [activeId, setActiveId] = useState(null);
            const [isTV, setIsTV] = useState(false);
            const [season, setSeason] = useState(1);
            const [episode, setEpisode] = useState(1);
            const [server, setServer] = useState('to'); 
            const [searchQuery, setSearchQuery] = useState("");
            const [debouncedSearch, setDebouncedSearch] = useState("");
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [showSearchDropdown, setShowSearchDropdown] = useState(false);
            const searchRef = useRef(null);
            const [isSearchFocused, setIsSearchFocused] = useState(false);
            const [isSignUp, setIsSignUp] = useState(false);
            const [authError, setAuthError] = useState('');
            const [loginName, setLoginName] = useState('');
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [continueWatching, setContinueWatching] = useState([]);
            const [aiRecs, setAiRecs] = useState([]);
            const [selectedMovie, setSelectedMovie] = useState(null);
            const [filterGenre, setFilterGenre] = useState(null);
            const [showProfile, setShowProfile] = useState(false);
            const [discoverMovies, setDiscoverMovies] = useState([]);
            const [discoverPage, setDiscoverPage] = useState(1);
            const [totalPages, setTotalPages] = useState(500);
            const [isFetchingMore, setIsFetchingMore] = useState(false);
            const [movies, setMovies] = useState({ trending: [], tvTrending: [], anime: [] });
            
            const [editName, setEditName] = useState('');
            const [editAvatar, setEditAvatar] = useState('');
            const [editPassword, setEditPassword] = useState('');
            const [settingsSuccess, setSettingsSuccess] = useState(false);

            useEffect(() => { if (currentUser) { setEditName(currentUser.name || ''); setEditAvatar(currentUser.avatar || ''); } }, [currentUser]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (searchRef.current && !searchRef.current.contains(event.target)) { setShowSearchDropdown(false); setIsSearchFocused(false); }
                    if (!event.target.closest('.profile-container') && !event.target.closest('.theme-toggle-btn')) setShowProfile(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            useEffect(() => {
                const handleKeyDown = (e) => { if (e.key === 'Escape') { setSelectedMovie(null); setShowSearchDropdown(false); setShowProfile(false); setIsSearchFocused(false); } };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => {
                let progressInterval;
                if (page === 'watch' && activeId) {
                    progressInterval = setInterval(() => {
                        setContinueWatching(prev => {
                            const updated = prev.map(m => {
                                if (m.id === activeId) { return { ...m, watchedTime: Math.min((m.watchedTime || 0) + 5, m.isTV ? 2700 : 7200), totalTime: m.isTV ? 2700 : 7200 }; }
                                return m;
                            });
                            localStorage.setItem('lavender_history', JSON.stringify(updated));
                            return updated;
                        });
                    }, 5000); 
                }
                return () => clearInterval(progressInterval);
            }, [page, activeId]);

            const goToHome = () => { setPage('home'); setActiveId(null); setIsTV(false); setSearchQuery(""); setSearchResults([]); setShowSearchDropdown(false); setIsSearchFocused(false); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            const handleLogout = () => { localStorage.removeItem('lavender_active_user'); globalStore.set({ currentUser: null }); setPage('login'); setShowProfile(false); setLoginPassword(''); };

            useEffect(() => {
                if (!isDarkMode) document.body.classList.add('light-mode'); else document.body.classList.remove('light-mode');
                localStorage.setItem('lavender_theme', JSON.stringify(isDarkMode));
            }, [isDarkMode]);

            const fetchDiscoverData = async (pageNum, isManual = false) => {
                if (isManual) globalStore.set({ globalLoading: true }); else setIsFetchingMore(true);
                try {
                    const res = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&language=vi-VN&page=${pageNum}&sort_by=popularity.desc`);
                    if (!res.ok) throw new Error(`Status: ${res.status}`);
                    const data = await res.json();
                    if (isManual) { setDiscoverMovies(data.results); window.scrollTo({ top: document.body.scrollHeight / 1.5, behavior: 'smooth' }); } 
                    else setDiscoverMovies(prev => [...prev, ...data.results]);
                    setTotalPages(Math.min(data.total_pages, 500));
                } catch(e) { globalStore.set({ globalError: { title: "API Mất Kết Nối", message: "Vui lòng kiểm tra lại mạng hoặc thử lại sau." } }); } 
                finally { setIsFetchingMore(false); if (isManual) globalStore.set({ globalLoading: false }); }
            };

            useEffect(() => {
                if (page !== 'login') {
                    const history = JSON.parse(localStorage.getItem('lavender_history') || '[]');
                    setContinueWatching(history);
                    const fetchMovies = async () => {
                        setIsLoading(true);
                        const urls = { trending: `${BASE_URL}/trending/movie/week?api_key=${API_KEY}&language=vi-VN`, tvTrending: `${BASE_URL}/trending/tv/week?api_key=${API_KEY}&language=vi-VN`, anime: `${BASE_URL}/discover/tv?api_key=${API_KEY}&with_genres=16&with_original_language=ja&language=vi-VN` };
                        const fetchedData = {};
                        try {
                            for (const [key, url] of Object.entries(urls)) {
                                const res = await fetch(url);
                                if(!res.ok) throw new Error();
                                fetchedData[key] = (await res.json()).results || [];
                            }
                            setMovies(prev => ({ ...prev, ...fetchedData }));
                            await fetchDiscoverData(1);
                        } catch (e) { globalStore.set({ globalError: { title: "Không thể tải phim", message: "Có lỗi khi kết nối tới máy chủ TheMovieDB." } }); } 
                        finally { setTimeout(() => setIsLoading(false), 800); }
                    };
                    fetchMovies();
                }
            }, [page]);

            const handleLoadMore = useCallback(() => {
                if (isFetchingMore || discoverPage >= totalPages) return;
                const nextPage = discoverPage + 1; setDiscoverPage(nextPage); fetchDiscoverData(nextPage, false);
            }, [discoverPage, isFetchingMore, totalPages]);

            useEffect(() => {
                if (continueWatching.length > 0 && page !== 'login') {
                    const fetchMultiRecs = async () => {
                        const top3History = continueWatching.slice(0, 3); let aggregatedRecs = [];
                        for (const item of top3History) {
                            try { const res = await fetch(`${BASE_URL}/${item.isTV ? 'tv' : 'movie'}/${item.id}/recommendations?api_key=${API_KEY}&language=vi-VN`); aggregatedRecs = [...aggregatedRecs, ...((await res.json()).results || [])]; } catch (e) {} 
                        }
                        setAiRecs(Array.from(new Map(aggregatedRecs.map(m => [m.id, m])).values()).sort(() => 0.5 - Math.random()).slice(0, 15));
                    };
                    fetchMultiRecs();
                }
            }, [continueWatching, page]);

            useEffect(() => { const timer = setTimeout(() => setDebouncedSearch(searchQuery), 500); return () => clearTimeout(timer); }, [searchQuery]);

            useEffect(() => {
                if (debouncedSearch.length > 1) {
                    setIsSearching(true); setShowSearchDropdown(true);
                    fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${debouncedSearch}&language=vi-VN`)
                        .then(res => { if(!res.ok) throw new Error(); return res.json(); })
                        .then(data => { setSearchResults(data.results || []); setIsSearching(false); })
                        .catch(err => { setIsSearching(false); globalStore.set({ globalError: { title: "Lỗi Tìm Kiếm", message: "Đã xảy ra lỗi mạng." } }); });
                } else { setSearchResults([]); setIsSearching(false); setShowSearchDropdown(false); }
            }, [debouncedSearch]);

            const handleOpenModal = (m) => setSelectedMovie(m);
            const handleSelectMedia = (item, tvStatus) => {
                const savedProgress = continueWatching.find(m => m.id === item.id);
                const historyItem = { id: item.id, title: item.title || item.name, poster: item.poster_path, backdrop: item.backdrop_path, isTV: tvStatus, lastSeason: savedProgress?.lastSeason || 1, lastEpisode: savedProgress?.lastEpisode || 1, watchedTime: savedProgress?.watchedTime || 0, totalTime: savedProgress?.totalTime || (tvStatus ? 2700 : 7200) };
                const filtered = continueWatching.filter(m => m.id !== item.id);
                const newHistory = [historyItem, ...filtered].slice(0, 10);
                setContinueWatching(newHistory); localStorage.setItem('lavender_history', JSON.stringify(newHistory));

                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center justify-center py-20 text-white/40 slide-fade-stagger glass-deep rounded-[40px] border border-white/10 mt-8">
                                        <i className="fas fa-ghost text-6xl mb-6 opacity-30 drop-shadow-md"></i>
                                        <p className="text-xl font-black mb-2 tracking-tight">Chưa có lịch sử xem phim</p>
                                        <p className="text-sm font-medium opacity-70">Có vẻ bạn chưa trải nghiệm bộ phim nào cả!</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {page === 'settings' && (
                        <div className="min-h-screen pt-36 px-6 md:px-12 pb-24 relative slide-fade-stagger flex justify-center">
                            <div className="w-full max-w-2xl iphone-glass p-8 md:p-12 rounded-[48px] shadow-[0_40px_80px_rgba(0,0,0,0.5)] border-t border-l border-white/20">
                                <h2 className="text-3xl font-black text-white tracking-tighter mb-8 flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full bg-indigo-500/20 flex items-center justify-center border border-indigo-500/30"><i className="fas fa-user-edit text-indigo-400"></i></div> Cài đặt tài khoản
                                </h2>
                                
                                {settingsSuccess && (
                                    <div className="mb-6 bg-green-500/10 border border-green-500/20 text-green-400 px-5 py-4 rounded-[20px] text-sm font-bold flex items-center gap-3 slide-fade-stagger">
                                        <i className="fas fa-check-circle text-lg drop-shadow-[0_0_10px_rgba(52,211,153,0.8)]"></i> Đã lưu thông tin tài khoản thành công!
                                    </div>
                                )}

                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const users = JSON.parse(localStorage.getItem('lavender_users') || '[]');
                                    const updatedUsers = users.map(u => u.email === currentUser.email ? {...u, name: editName, avatar: editAvatar, password: editPassword || u.password} : u);
                                    localStorage.setItem('lavender_users', JSON.stringify(updatedUsers));
                                    const updatedUser = {...currentUser, name: editName, avatar: editAvatar, password: editPassword || currentUser.password};
                                    localStorage.setItem('lavender_active_user', JSON.stringify(updatedUser)); globalStore.set({ currentUser: updatedUser });
                                    setSettingsSuccess(true); setEditPassword(''); setTimeout(() => setSettingsSuccess(false), 4000);
                                }} className="space-y-6">
                                    <div className="flex flex-col items-center mb-6">
                                        <div className="w-28 h-28 rounded-full border-[3px] border-indigo-400/50 mb-4 overflow-hidden shadow-[0_0_20px_rgba(129,140,248,0.3)] bg-black/50 p-1"><img src={editAvatar || USER_AVATAR} className="w-full h-full object-cover rounded-full" onError={(e) => {e.target.onerror = null; e.target.src = USER_AVATAR}} /></div>
                                    </div>
                                    <div className="space-y-5">
                                        <div className="relative group">
                                            <label className="text-[11px] text-white/50 font-black uppercase tracking-widest mb-2 block">Họ và tên</label>
                                            <input type="text" value={editName} onChange={e => setEditName(e.target.value)} required className="w-full px-5 py-4 rounded-[20px] outline-none border border-white/10 bg-black/20 text-sm text-white focus:border-indigo-400/50 transition-colors" />
                                        </div>
                                        <div className="relative group">
                                            <label className="text-[11px] text-white/50 font-black uppercase tracking-widest mb-2 block">Email đăng nhập</label>
                                            <input type="email" value={currentUser?.email} disabled className="w-full px-5 py-4 rounded-[20px] outline-none border border-white/5 bg-black/40 text-sm text-white/40 cursor-not-allowed" />
                                        </div>
                                        <div className="relative group">
                                            <label className="text-[11px] text-white/50 font-black uppercase tracking-widest mb-2 block">URL Ảnh đại diện</label>
                                            <input type="text" value={editAvatar} onChange={e => setEditAvatar(e.target.value)} className="w-full px-5 py-4 rounded-[20px] outline-none border border-white/10 bg-black/20 text-sm text-white focus:border-indigo-400/50 transition-colors placeholder:text-white/20" placeholder="https://..." />
                                        </div>
                                        <div className="relative group">
                                            <label className="text-[11px] text-white/50 font-black uppercase tracking-widest mb-2 block">Đổi Mật khẩu (Bỏ trống nếu không đổi)</label>
                                            <input type="password" value={editPassword} onChange={e => setEditPassword(e.target.value)} placeholder="••••••••" className="w-full px-5 py-4 rounded-[20px] outline-none border border-white/10 bg-black/20 text-sm text-white focus:border-indigo-400/50 transition-colors" />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full p-4 mt-8 rounded-[20px] btn-primary btn-press text-sm font-black uppercase tracking-widest">Lưu thay đổi</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {page === 'watch' && (
                        <div className="min-h-screen w-full flex flex-col items-center pt-28 p-6 pb-16 relative slide-fade-stagger">
                            <button onClick={() => setPage('home')} className="fixed top-8 left-6 z-50 px-6 py-3 bg-white/10 backdrop-blur-md rounded-full text-white text-sm font-bold uppercase btn-press border border-white/20 shadow-lg hover:bg-white/20 transition-colors"><i className="fas fa-arrow-left mr-2"></i>Trở về</button>
                            <div className="w-full max-w-[1200px] flex flex-col gap-8 relative z-10">
                                <div className="aspect-video w-full rounded-[40px] overflow-hidden shadow-[0_40px_80px_rgba(0,0,0,0.8)] border border-white/10 bg-black">
                                    <iframe src={isTV ? `https://vidsrc.${server}/embed/tv/${activeId}/${season}/${episode}` : `https://vidsrc.${server}/embed/movie/${activeId}`} className="w-full h-full" allowFullScreen></iframe>
                                </div>
                                <div className="flex gap-4 justify-center">
                                    {[{id:'to', name:'Server TO'}, {id:'me', name:'Server ME'}].map((srv) => (
                                        <button key={srv.id} onClick={() => setServer(srv.id)} className={`px-6 py-3 rounded-2xl text-sm font-bold btn-press tracking-wide ${server === srv.id ? 'btn-primary' : 'bg-white/5 border border-white/10 text-white/60 hover:text-white hover:bg-white/10'}`}>{srv.name}</button>
                                    ))}
                                </div>
                                {isTV && (
                                    <div className="iphone-glass p-8 rounded-[40px] w-full max-w-4xl mx-auto shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
                                        <div className="flex items-center justify-between mb-6">
                                            <h3 className="font-black text-xl text-white tracking-tight">Chọn tập phim</h3>
                                            <div className="flex items-center gap-3 bg-black/30 px-4 py-2 rounded-2xl border border-white/10">
                                                <span className="text-sm text-white/60 font-bold uppercase tracking-wider">Mùa</span>
                                                <input type="number" min="1" value={season} onChange={(e) => setSeason(parseInt(e.target.value) || 1)} className="w-12 bg-transparent text-white text-lg font-black outline-none text-center" />
                                            </div>
                                        </div>
                                        <div className="flex flex-wrap gap-3">
                                            {[...Array(24)].map((_, i) => (
                                                <button key={i} onClick={() => setEpisode(i + 1)} className={`w-14 h-14 rounded-2xl font-black text-base btn-press ${episode === i + 1 ? 'btn-primary' : 'bg-white/5 border border-white/10 text-white/70 hover:text-white hover:bg-white/10'}`}>{i + 1}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <MovieFeedback movieId={activeId} />
                            </div>
                        </div>
                    )}

                    {selectedMovie && (
                        <div className="modal-overlay fixed inset-0 flex items-center justify-center p-4 md:p-8 z-[200]">
                            <div className="modal-backdrop-blur" style={{backgroundImage: `url(${IMG_PATH + (selectedMovie.backdrop_path || selectedMovie.backdrop)})`}}></div>
                            
                            <div className="w-full max-w-6xl bg-black/50 backdrop-blur-3xl rounded-[48px] overflow-hidden relative flex flex-col md:flex-row modal-spring border border-white/15 shadow-[0_50px_100px_rgba(0,0,0,0.9)] z-10">
                                <button onClick={() => setSelectedMovie(null)} className="absolute top-6 right-6 w-12 h-12 rounded-full bg-black/40 backdrop-blur-xl text-white/80 z-50 flex items-center justify-center btn-press hover:bg-white/20 hover:text-white border border-white/20 transition-all shadow-lg"><i className="fas fa-times text-xl"></i></button>
                                
                                <div className="w-full h-72 md:h-auto md:w-[45%] relative shrink-0">
                                    <img src={selectedMovie.poster_path ? (selectedMovie.poster_path.startsWith('http') ? selectedMovie.poster_path : IMG_PATH + selectedMovie.poster_path) : 'https://via.placeholder.com/600x900'} className="absolute inset-0 w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#020617] via-[#020617]/50 to-transparent md:bg-gradient-to-r md:from-transparent md:via-[#020617]/40 md:to-black/80"></div>
                                </div>

                                <div className="w-full md:w-[55%] p-8 md:p-12 flex flex-col justify-center bg-transparent relative z-10 max-h-[85vh] overflow-y-auto scrollbar-hide">
                                    <h2 className="text-4xl md:text-6xl font-black mb-5 text-white leading-tight drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)] tracking-tighter">{selectedMovie.title || selectedMovie.name}</h2>
                                    
                                    {selectedMovie.genre_ids && (
                                        <div className="flex flex-wrap gap-2 mb-6">
                                            {selectedMovie.genre_ids.map(id => <span key={id} className="px-4 py-1.5 text-[11px] font-black bg-white/10 border border-white/20 rounded-full text-white backdrop-blur-md uppercase tracking-widest shadow-sm">{GENRES[id] || "Phim"}</span>)}
                                        </div>
                                    )}

                                    <div className="flex items-center gap-5 mb-8 text-sm text-white/70 font-bold uppercase tracking-widest">
                                        <span className="flex items-center gap-2 text-yellow-400 bg-yellow-400/10 px-3 py-1.5 rounded-xl border border-yellow-400/20 shadow-[0_0_15px_rgba(250,204,21,0.2)]"><i className="fas fa-star drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]"></i> {selectedMovie.vote_average?.toFixed(1) || "N/A"}</span>
                                        <span className="w-1.5 h-1.5 rounded-full bg-white/30"></span>
                                        <span className="bg-white/5 px-3 py-1.5 rounded-xl border border-white/10">{selectedMovie.release_date?.split('-')[0] || selectedMovie.first_air_date?.split('-')[0] || "2026"}</span>
                                    </div>
                                    
                                    <p className="text-base text-white/80 mb-10 leading-relaxed font-medium line-clamp-5 md:line-clamp-none">{selectedMovie.overview || "Đang cập nhật nội dung chi tiết cho bộ phim này. Hãy quay lại sau nhé!"}</p>
                                    
                                    <div className="flex gap-4 mt-auto">
                                        <button onClick={() => handleSelectMedia(selectedMovie, !!selectedMovie.first_air_date || selectedMovie.isTV)} className="flex-1 md:flex-none px-10 py-5 btn-primary rounded-2xl font-black tracking-widest uppercase text-white btn-press flex items-center justify-center gap-3"><i className="fas fa-play text-xl"></i> Xem ngay</button>
                                        <button onClick={(e) => {
                                                const btn = e.currentTarget; const icon = btn.querySelector('i');
                                                globalStore.set({ isSyncing: true }); const currentFavs = globalStore.get().favorites;
                                                let newFavs = currentFavs.some(f => f.id === selectedMovie.id) ? currentFavs.filter(f => f.id !== selectedMovie.id) : [selectedMovie, ...currentFavs];
                                                icon.className = currentFavs.some(f => f.id === selectedMovie.id) ? "far fa-heart text-2xl transition-all text-white" : "fas fa-heart text-2xl heart-active";
                                                globalStore.set({ favorites: newFavs }); localStorage.setItem('lavender_favorites', JSON.stringify(newFavs));
                                                setTimeout(() => globalStore.set({ isSyncing: false }), 400);
                                            }} className="w-[64px] h-[64px] bg-white/10 rounded-2xl border border-white/20 flex items-center justify-center btn-press hover:bg-white/20 transition-colors shadow-lg">
                                            <i className={`fa-heart text-2xl transition-all ${favorites.some(f => f.id === selectedMovie.id) ? 'fas heart-active' : 'far text-white'}`}></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <FeedbackWidget />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
